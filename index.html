      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
        <button onClick={joinMinigame} style={{padding:'7px 20px',borderRadius:8,border:'none',background:'linear-gradient(135deg,#43b581,#2ecc71)',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>Join!</button>
        <button onClick={()=>{FB.ref('minigame/invites/'+me).remove();setMgInvite(null);}} style={{padding:'7px 14px',borderRadius:8,border:'none',background:'rgba(255,255,255,.05)',color:'#666',cursor:'pointer',fontSize:13,fontFamily:'inherit'}}>Decline</button>
      </div>
    </div>
  );

  // ── Mini-game picker modal ────────────────────────────────────
  const MGPickerModal = showMGPick && (
    <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.7)',zIndex:30,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'#1a1a2a',border:'1px solid rgba(255,255,255,.08)',borderRadius:16,padding:24,width:380,maxWidth:'90vw'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontWeight:800,fontSize:16,color:'#e0e4ff'}}>🎮 Start a Mini-Game</span>
          <button onClick={()=>setShowMGPick(false)} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:22}}>×</button>
        </div>
        <div style={{fontSize:11,color:'#444',marginBottom:16}}>All players currently in the world will be invited.</div>
        {MINIGAME_TYPES.map(type => (
          <div key={type.id} onClick={()=>startMinigame(type)}
            style={{padding:'12px 14px',borderRadius:10,marginBottom:8,background:'rgba(255,255,255,.02)',border:'1px solid rgba(255,255,255,.06)',cursor:'pointer',display:'flex',alignItems:'center',gap:12,transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(253,203,110,.06)';e.currentTarget.style.borderColor='rgba(253,203,110,.2)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.02)';e.currentTarget.style.borderColor='rgba(255,255,255,.06)';}}>
            <span style={{fontSize:28}}>{type.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13,color:'#dde0f8',marginBottom:2}}>{type.name}</div>
              <div style={{fontSize:11,color:'#555'}}>{type.desc}</div>
            </div>
            <div style={{fontSize:11,color:'#fdcb6e',fontWeight:700,flexShrink:0}}>+{type.aura} Aura</div>
          </div>
        ))}
      </div>
    </div>
  );

  // ── Mini-game result screen ───────────────────────────────────
  if (inMG && mgResult) {
    const isHide = mgResult.type === 'hide';
    const survived = isHide ? me !== mgResult.it : mgResult.winner === me;
    const won = survived;
    const type = MINIGAME_TYPES.find(t=>t.id===mgResult.type);
    const winnerData = mgPlayers[mgResult.winner]||{};
    const seekerData = isHide ? (mgPlayers[mgResult.it]||{}) : null;
    return (
      <div style={{position:'fixed',inset:0,background:'#0a0a14',zIndex:900,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:20,fontFamily:'inherit'}}>
        <div style={{fontSize:60,filter:`drop-shadow(0 0 30px ${won?'gold':'#555'})`}}>{won?'🏆':'😔'}</div>
        <div style={{fontSize:28,fontWeight:900,color:won?'#fdcb6e':'#888'}}>{isHide?(won?'You Survived!':'You Were the Seeker!'):(won?'You Won!':'Game Over')}</div>
        {isHide && seekerData && <div style={{fontSize:15,color:'#888'}}>Final seeker: <span style={{color:'#fff',fontWeight:700}}>{seekerData.name||mgResult.it} {seekerData.avatar||''}</span></div>}
        {!isHide && mgResult.winner && <div style={{fontSize:15,color:'#888'}}>Winner: <span style={{color:'#fff',fontWeight:700}}>{winnerData.name||mgResult.winner} {winnerData.avatar||''}</span></div>}
        {won&&type&&<div style={{padding:'8px 20px',borderRadius:10,background:'rgba(253,203,110,.1)',border:'1px solid rgba(253,203,110,.2)',color:'#fdcb6e',fontWeight:700,fontSize:14}}>+{type.aura} Aura earned!</div>}
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button onClick={leaveMG} style={{padding:'10px 28px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#fdcb6e,#e17055)',color:'#fff',fontWeight:700,cursor:'pointer',fontSize:14,fontFamily:'inherit'}}>Back to World</button>
        </div>
      </div>
    );
  }

  // ── Mini-game world ───────────────────────────────────────────
  if (inMG && mgState) {
    const mgMap = getMGMap(mgState.type);
    const mgType = MINIGAME_TYPES.find(t=>t.id===mgState.type)||MINIGAME_TYPES[0];
    const myMGData = mgPlayers[me]||{};
    const isLobby = mgState.status==='lobby';
    const isActive = mgState.status==='active';
    const lightColor = mgState.light==='green'?'#2ecc71':'#e74c3c';
    const isIt = mgState.it===me;

    return (
      <div style={{position:'fixed',inset:0,background:'#060610',zIndex:900,display:'flex',flexDirection:'column',fontFamily:'inherit'}}>
        {MGPickerModal}

        {/* MG Header */}
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'7px 14px',background:'#0d0d1a',borderBottom:'1px solid rgba(255,255,255,.07)',flexShrink:0}}>
          <span style={{fontSize:20}}>{mgType.icon}</span>
          <span style={{fontWeight:900,fontSize:14,color:'#e0e4ff'}}>{mgType.name}</span>

          {/* 4C corner indicator */}
          {mgState.type==='corners'&&isActive&&mgState.corner&&(
            <div style={{marginLeft:8,padding:'4px 12px',borderRadius:20,background:'rgba(231,76,60,.15)',border:'1px solid rgba(231,76,60,.3)',fontSize:12,fontWeight:800,color:'#e74c3c'}}>
              ❌ Corner {mgState.corner} eliminated!
            </div>
          )}

          {/* Hide & Seek seeker indicator */}
          {mgState.type==='hide'&&isActive&&(
            <div style={{marginLeft:8,padding:'4px 12px',borderRadius:20,background:isIt?'rgba(231,76,60,.2)':'rgba(13,13,26,.8)',border:`1px solid ${isIt?'rgba(231,76,60,.4)':'rgba(255,255,255,.07)'}`,fontSize:12,fontWeight:800,color:isIt?'#e74c3c':'#888'}}>
              {isIt?'👁 YOU ARE THE SEEKER':'🫥 Hide! Seeker: '+(mgPlayers[mgState.it]?.name||mgState.it||'?')}
            </div>
          )}

          {/* 4 Corners countdown */}
          {mgState.type==='corners'&&isActive&&mgState.cornersPickAt&&(
            <div style={{marginLeft:8,padding:'4px 12px',borderRadius:20,background:'rgba(253,203,110,.12)',border:'1px solid rgba(253,203,110,.3)',fontSize:12,fontWeight:800,color:'#fdcb6e',fontVariantNumeric:'tabular-nums'}}>
              🎲 Pick in {Math.max(0,Math.ceil((mgState.cornersPickAt-Date.now())/1000))}s — get to a corner!
            </div>
          )}

          {isLobby&&<span style={{marginLeft:8,fontSize:11,color:'#fdcb6e',fontWeight:700}}>⏳ Waiting for players…</span>}
          {isActive&&<span style={{marginLeft:8,fontSize:12,color:'#555',fontWeight:700,fontVariantNumeric:'tabular-nums'}}>⏱ {mgTimer}s</span>}

          <div style={{marginLeft:'auto',display:'flex',gap:6,alignItems:'center'}}>
            <span style={{fontSize:11,color:'#333'}}>👥 {Object.keys(mgPlayers).length}</span>
            {isAdmin&&isLobby&&<button onClick={startGame} style={{padding:'5px 12px',borderRadius:7,border:'none',background:'linear-gradient(135deg,#43b581,#2ecc71)',color:'#fff',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>▶ Start</button>}
            {isAdmin&&isActive&&<button onClick={endMinigame} style={{padding:'5px 12px',borderRadius:7,border:'1px solid rgba(255,255,255,.08)',background:'transparent',color:'#555',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>End</button>}
            <button onClick={leaveMG} style={{padding:'5px 12px',borderRadius:7,border:'none',background:'rgba(255,80,80,.1)',color:'#ff7070',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>✕ Leave</button>
          </div>
        </div>

        {/* Lobby screen */}
        {isLobby&&(
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'#080814'}}>
            <div style={{fontSize:52}}>{mgType.icon}</div>
            <div style={{fontSize:20,fontWeight:900,color:'#e0e4ff'}}>{mgType.name}</div>
            <div style={{fontSize:13,color:'#555',maxWidth:320,textAlign:'center'}}>{mgType.desc}</div>
            <div style={{marginTop:8,padding:'12px 20px',borderRadius:12,background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',minWidth:200}}>
              <div style={{fontSize:11,color:'#444',fontWeight:700,textTransform:'uppercase',letterSpacing:.8,marginBottom:10}}>Players Ready</div>
              {Object.entries(mgPlayers).map(([u,p])=>(
                <div key={u} style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <AvatarSprite emoji={p.avatar||'👤'} color={p.color||avColor(u)} size={28} glow={u===me} isMe={u===me}/>
                  <span style={{fontSize:13,color:u===me?'#fff':'#aaa',fontWeight:u===me?700:400}}>{p.name||u}{u===me?' (you)':''}</span>
                  <span style={{marginLeft:'auto',fontSize:11,color:'#43b581'}}>✓</span>
                </div>
              ))}
              {Object.keys(mgPlayers).length===0&&<div style={{fontSize:12,color:'#333'}}>Waiting…</div>}
            </div>
            {!isAdmin&&<div style={{fontSize:12,color:'#444'}}>Waiting for {mgState.startedBy} to start the game…</div>}
            {isAdmin&&<div style={{fontSize:12,color:'#555'}}>Press <span style={{color:'#43b581',fontWeight:700}}>▶ Start</span> when everyone has joined.</div>}
          </div>
        )}

        {/* Active mini-game map — camera follows player */}
        {isActive&&(()=>{
          // Line-of-sight for Hide & Seek (Bresenham ray — walls block vision)
          let hnsVisible = null;
          if (mgState.type === 'hide') {
            const hMap = getMGMap('hide');
            const hasLoS = (x1, y1) => {
              let x0=mgPos.x, y0=mgPos.y;
              const dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
              const sx=x0<x1?1:-1, sy=y0<y1?1:-1;
              let err=dx-dy, cx=x0, cy=y0;
              while(cx!==x1||cy!==y1){
                const e2=2*err;
                if(e2>-dy){err-=dy;cx+=sx;}
                if(e2<dx){err+=dx;cy+=sy;}
                if(cx===x1&&cy===y1) break;
                if(hMap[cy]&&hMap[cy][cx]===1) return false;
              }
              return true;
            };
            hnsVisible = new Set();
            hMap.forEach((row,ry)=>row.forEach((tile,rx)=>{
              if(tile!==1&&hasLoS(rx,ry)) hnsVisible.add(rx+','+ry);
            }));
          }
          const fogTiles = hnsVisible ? getMGMap('hide').map((row,ry) => (
            <div key={ry} style={{display:'flex'}}>
              {row.map((tile,rx) => {
                const vis = hnsVisible.has(rx+','+ry);
                return (
                  <div key={rx} style={{width:TILE,height:TILE,flexShrink:0,background:vis?(MG_TILE_BG[tile]||MG_TILE_BG[0]):'#050508',border:'1px solid rgba(0,0,0,.4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,userSelect:'none',boxSizing:'border-box'}}>
                    {vis?(MG_TILE_ICN[tile]||''):''}
                  </div>
                );
              })}
            </div>
          )) : null;
          return (
          <div style={{flex:1,display:'flex',overflow:'hidden'}}>
            <div style={{flex:1,overflow:'hidden',position:'relative',background:mgState.type==='hide'?'#050508':'#080814'}}>
              <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
                <div style={{position:'absolute',top:`calc(50% - ${mgPos.y*TILE+TILE/2}px)`,left:`calc(50% - ${mgPos.x*TILE+TILE/2}px)`}}>
                  {fogTiles||mgTiles}
                  {renderPlayers(mgPlayers, mgPos, true, hnsVisible)}
                </div>
              </div>
            </div>

            {/* MG player sidebar */}
            <div style={{width:MG_PANEL_W,background:'#0d0d1a',borderLeft:'1px solid rgba(255,255,255,.06)',overflowY:'auto',flexShrink:0}}>
              <div style={{padding:'7px 10px',fontSize:9,fontWeight:700,color:'#333',textTransform:'uppercase',letterSpacing:.8,borderBottom:'1px solid rgba(255,255,255,.05)'}}>
                Players — {Object.keys(mgPlayers).length}
              </div>
              {Object.entries(mgPlayers).sort((a,b)=>(b[1].score||0)-(a[1].score||0)).map(([u,p])=>(
                <div key={u} style={{display:'flex',alignItems:'center',gap:7,padding:'7px 10px',borderBottom:'1px solid rgba(255,255,255,.04)',opacity:p.eliminated?0.45:1}}>
                  <AvatarSprite emoji={p.avatar||'👤'} color={p.color||avColor(u)} size={28} isMe={u===me} isIt={mgState.type==='hide'&&mgState.it===u} eliminated={p.eliminated}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,color:u===me?'#fff':'#bbb',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name||u}</div>
                    {p.eliminated&&<div style={{fontSize:9,color:'#e74c3c'}}>eliminated</div>}
                  </div>
                </div>
              ))}
            </div>
          </div>
          );
        })()}

        {ChatBar()}
      </div>
    );
  }

  // ── Main RPG world ────────────────────────────────────────────
  const others = Object.entries(players).filter(([u])=>u!==me);

  return (
    <div style={{position:'fixed',inset:0,background:'#0a0a0a',zIndex:900,display:'flex',flexDirection:'column',fontFamily:'inherit'}}>
      {MGPickerModal}
      {InviteOverlay}

      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:isMobile?6:10,padding:isMobile?'6px 10px':'8px 16px',background:'#111',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0,minWidth:0}}>
        <AvatarSprite emoji={avatar.emoji} color={col} size={isMobile?26:32} glow isMe />
        {!isMobile&&<span style={{fontWeight:900,fontSize:15,background:'linear-gradient(135deg,#fdcb6e,#e17055)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',marginLeft:2}}>AuraMail RPG</span>}
        {!isMobile&&<span style={{fontSize:11,color:'#333',marginLeft:2}}>WASD / ↑↓←→</span>}
        <div style={{marginLeft:'auto',display:'flex',gap:isMobile?4:7,alignItems:'center',flexShrink:0}}>
          <span style={{fontSize:11,color:'#444'}}>👥 {Object.keys(players).length}</span>
          {isAdmin&&<button onClick={()=>setShowMGPick(true)} style={{padding:isMobile?'5px 8px':'5px 12px',borderRadius:7,border:'1px solid rgba(253,203,110,.25)',background:'rgba(253,203,110,.06)',color:'#fdcb6e',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>{isMobile?'🎮':'🎮 Mini-Games'}</button>}
          <button onClick={()=>setShowQ(p=>!p)} style={{padding:'5px 10px',borderRadius:7,border:'1px solid rgba(255,255,255,.07)',background:'rgba(255,255,255,.03)',color:'#888',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>📋</button>
          <button onClick={onClose} style={{padding:'5px 10px',borderRadius:7,border:'none',background:'rgba(255,80,80,.1)',color:'#ff7070',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>{isMobile?'✕':'✕ Exit'}</button>
        </div>
      </div>

      {/* Body */}
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>

        {/* Map — camera follows player */}
        <div style={{flex:1,overflow:'hidden',position:'relative',background:'#0d0d0a'}}>
          <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
            <div style={{position:'absolute',top:`calc(50% - ${pos.y*TILE+TILE/2}px)`,left:`calc(50% - ${pos.x*TILE+TILE/2}px)`}}>
              {rpgTiles}
              {renderPlayers({...players,[me]:{x:pos.x,y:pos.y,avatar:avatar.emoji,name:disp,color:col}}, pos, false)}
            </div>
          </div>
        </div>

        {/* Right panel */}
        <div style={{width:PANEL_W,background:'#111',borderLeft:'1px solid rgba(255,255,255,.06)',display:'flex',flexDirection:'column',flexShrink:0,overflowY:'auto'}}>
          <div style={{padding:'8px 12px',fontSize:10,fontWeight:700,color:'#333',textTransform:'uppercase',letterSpacing:.8,borderBottom:'1px solid rgba(255,255,255,.05)',flexShrink:0}}>
            Players — {Object.keys(players).length}
          </div>
          {/* Me */}
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'rgba(91,141,238,.07)',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
            <AvatarSprite emoji={avatar.emoji} color={col} size={32} glow isMe />
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,color:'#fff',fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{disp} <span style={{fontSize:10,color:'#5b8dee'}}>(you)</span></div>
              <div style={{fontSize:10,color:'#444'}}><span style={{color:'#fdcb6e'}}>{(auraMap[me]||0).toLocaleString()} Aura</span></div>
            </div>
          </div>
          {others.length===0&&<div style={{padding:16,color:'#333',fontSize:12,textAlign:'center'}}>No other players yet</div>}
          {others.map(([uname,pd])=>{
            const pc=pd.color||avColor(uname);
            return(
              <div key={uname} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                <AvatarSprite emoji={pd.avatar||'👤'} color={pc} size={30} />
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,color:'#ccc',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pd.name||uname}</div>
                  <div style={{fontSize:10,color:'#444'}}><span style={{color:'#fdcb6e'}}>{(auraMap[uname]||0).toLocaleString()} Aura</span></div>
                </div>
              </div>
            );
          })}

          {/* Quest tracker */}
          <div style={{marginTop:'auto',borderTop:'1px solid rgba(255,255,255,.05)',padding:'8px 12px',flexShrink:0}}>
            <div style={{fontSize:10,fontWeight:700,color:'#333',textTransform:'uppercase',letterSpacing:.8,marginBottom:8}}>Active Quests</div>
            {RPG_QUESTS.filter(q=>!doneQ[q.id]).slice(0,3).map(q=>{
              const prog=q.type==='steps'?Math.min(steps,q.target):q.type==='chat'?Math.min(chatCount,q.target):0;
              return (
                <div key={q.id} style={{marginBottom:8}}>
                  <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#666',marginBottom:3}}>
                    <span>{q.icon} {q.name}</span><span style={{color:'#fdcb6e'}}>+{q.reward}</span>
                  </div>
                  {(q.type==='steps'||q.type==='chat')&&(
                    <div style={{height:3,background:'rgba(255,255,255,.06)',borderRadius:2}}>
                      <div style={{height:'100%',background:'#5b8dee',borderRadius:2,width:`${(prog/(q.target||1))*100}%`,transition:'width .3s'}}/>
                    </div>
                  )}
                </div>
              );
            })}
            {RPG_QUESTS.every(q=>doneQ[q.id])&&<div style={{fontSize:11,color:'#43b581'}}>✅ All quests done!</div>}
          </div>
        </div>
      </div>

      {ChatBar()}

      {/* Quests overlay */}
      {showQ&&(
        <div style={{position:'absolute',top:52,right:216,background:'#1a1a2a',border:'1px solid rgba(255,255,255,.08)',borderRadius:12,padding:16,width:290,zIndex:10,boxShadow:'0 8px 32px rgba(0,0,0,.7)',maxHeight:'60vh',overflowY:'auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <span style={{fontWeight:800,color:'#e0e4ff',fontSize:15}}>📋 Quests</span>
            <button onClick={()=>setShowQ(false)} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:20}}>×</button>
          </div>
          {RPG_QUESTS.map(q=>{
            const done=doneQ[q.id];
            return(
              <div key={q.id} style={{padding:'10px 12px',borderRadius:8,marginBottom:6,background:done?'rgba(67,181,129,.05)':'rgba(255,255,255,.02)',border:`1px solid ${done?'rgba(67,181,129,.2)':'rgba(255,255,255,.05)'}`}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                  <span style={{fontSize:13,fontWeight:700,color:done?'#43b581':'#ccc'}}>{q.icon} {q.name}{done?' ✓':''}</span>
                  <span style={{fontSize:12,color:'#fdcb6e',fontWeight:700}}>+{q.reward}</span>
                </div>
                <div style={{fontSize:11,color:'#444'}}>{q.desc}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════════ */

  const [activeCh,     setActiveCh]     = useState('general');

  const [users,        setUsers]        = useState({});
  const [showModal,    setShowModal]    = useState(false);
  const [showProfile,  setShowProfile]  = useState(false);
  const [muted,        setMuted]        = useState([]);
  const [admins,       setAdmins]       = useState([]);
  const [presence,     setPresence]     = useState({});
  const [unread,       setUnread]       = useState({});
  const [auraMap,          setAuraMap]          = useState({});
  const [activeQuiz,       setActiveQuiz]       = useState(null);
  const [showLB,           setShowLB]           = useState(false);
  const [showCoinFlip,     setShowCoinFlip]     = useState(false);
  const [lotteryPool,      setLotteryPool]      = useState(0);
  const [myTickets,        setMyTickets]        = useState(0);
  const [myItems,          setMyItems]          = useState({});
  const [userItems,        setUserItems]        = useState({});
  const [showLottery,      setShowLottery]      = useState(false);
  const [showShop,         setShowShop]         = useState(false);
  const [showRPG,          setShowRPG]          = useState(false);
  const [challengeTarget,  setChallengeTarget]  = useState(null);
  const [incomingChallenge,setIncomingChallenge]= useState(null);
  const [incomingChallengeId,setIncomingChallengeId]= useState(null);
  const [quizTarget,       setQuizTarget]       = useState(null);
  const lastSeenRef = useRef({});

  // Initialize default channels, then listen
  useEffect(() => {
    let chRef;
    async function init() {
      const snap = await FB.ref('channels').once('value');
      if (!snap.exists()) {
        const t = Date.now();
        await FB.ref('channels').set({
          general:       { id:'general',       name:'general',       type:'public', members:{}, created_by:'system', created:t },
          announcements: { id:'announcements', name:'announcements', type:'public', members:{}, created_by:'system', created:t },
          random:        { id:'random',        name:'random',        type:'public', members:{}, created_by:'system', created:t },
          gaming:        { id:'gaming',        name:'gaming',        type:'public', members:{}, created_by:'system', created:t },
        });
        await FB.ref('messages/general').push({
          author: '__system__',
          content: 'Welcome to ArrowsMail! Anyone can sign up and chat in real-time from any device.',
          ts: t, sys: true,
        });
      }
      chRef = FB.ref('channels');
      chRef.on('value', snap => {
        const data = snap.val() || {};
        const list = Object.values(data)
          .map(c => ({ ...c, members: Object.keys(c.members || {}) }))
          .sort((a, b) => a.created - b.created);
        setChs(list);
      });
    }
    init();
    return () => { if (chRef) chRef.off('value'); };
  }, []);

  // Listen to messages for active channel
  useEffect(() => {
    const ref = FB.ref('messages/' + activeCh);
    ref.on('value', snap => {
      const data = snap.val() || {};
      const list = Object.entries(data)
        .map(([k, v]) => ({ id: k, ...v }))
        .sort((a, b) => a.ts - b.ts);
      setMsgs(p => ({ ...p, [activeCh]: list }));
    });
    return () => ref.off('value');
  }, [activeCh]);

  // Listen to users
  useEffect(() => {
    const ref = FB.ref('users');
    ref.on('value', snap => setUsers(snap.val() || {}));
    return () => ref.off('value');
  }, []);

  // Listen to muted
  useEffect(() => {
    const ref = FB.ref('muted');
    ref.on('value', snap => {
      const data = snap.val() || {};
      setMuted(Object.keys(data).filter(k => data[k]));
    });
    return () => ref.off('value');
  }, []);

  // Listen to admins
  useEffect(() => {
    const ref = FB.ref('admins');
    ref.on('value', snap => {
      const data = snap.val() || {};
      setAdmins(Object.keys(data).filter(k => data[k]));
    });
    return () => ref.off('value');
  }, []);

  // Presence: mark self online, remove on disconnect
  useEffect(() => {
    const ref = FB.ref('presence/' + me);
    ref.set(Date.now());
    ref.onDisconnect().remove();
    const presRef = FB.ref('presence');
    presRef.on('value', snap => setPresence(snap.val() || {}));
    return () => { presRef.off('value'); ref.onDisconnect().cancel(); };
  }, [me]);

  // Listen to aura scores
  useEffect(() => {
    const ref = FB.ref('aura');
    ref.on('value', snap => setAuraMap(snap.val() || {}));
    return () => ref.off('value');
  }, []);

  // Listen to lottery pool
  useEffect(() => {
    const ref = FB.ref('lottery_pool');
    ref.on('value', snap => setLotteryPool(snap.val() || 0));
    return () => ref.off('value');
  }, []);

  // Listen to my tickets
  useEffect(() => {
    const ref = FB.ref('tickets/' + me);
    ref.on('value', snap => setMyTickets(snap.val() || 0));
    return () => ref.off('value');
  }, [me]);

  // Listen to my items
  useEffect(() => {
    const ref = FB.ref('items/' + me);
    ref.on('value', snap => setMyItems(snap.val() || {}));
    return () => ref.off('value');
  }, [me]);

  // Listen to all users' items (for chat badges)
  useEffect(() => {
    const ref = FB.ref('items');
    ref.on('value', snap => setUserItems(snap.val() || {}));
    return () => ref.off('value');
  }, []);

  // Listen for incoming coin flip challenges
  useEffect(() => {
    const ref = FB.ref('challenges/' + me);
    ref.on('child_added', snap => {
      const c = snap.val();
      if (c && c.status === 'pending') {
        setIncomingChallenge(c);
        setIncomingChallengeId(snap.key);
      }
    });
    return () => ref.off('child_added');
  }, [me]);

  // Listen for quiz sent by admin — always overrides random quiz
  useEffect(() => {
    const ref = FB.ref('quiz_inbox/' + me);
    ref.on('value', snap => {
      const q = snap.val();
      if (q) { setActiveQuiz({ ...q, fromAdmin: true }); ref.remove(); }
    });
    return () => ref.off('value');
  }, [me]);

  // Random quiz timer — fires every 3–7 minutes
  useEffect(() => {
    if (activeQuiz) return;
    const delay = (120 + Math.random() * 120) * 1000;
    const timer = setTimeout(() => {
      const q = QUIZ_QUESTIONS[Math.floor(Math.random() * QUIZ_QUESTIONS.length)];
      setActiveQuiz(q);
    }, delay);
    return () => clearTimeout(timer);
  }, [activeQuiz]);

  // Unread badge: track last-seen per channel
  useEffect(() => {
    lastSeenRef.current[activeCh] = Date.now();
    setUnread(p => ({ ...p, [activeCh]: 0 }));
  }, [activeCh]);

  useEffect(() => {
    const allMsgs = msgs[activeCh] || [];
    if (!allMsgs.length) return;
    const lastTs = lastSeenRef.current[activeCh] || 0;
    const newCount = allMsgs.filter(m => m.ts > lastTs && m.author !== me && !m.sys).length;
    // only update unread for other channels
    Object.keys(msgs).forEach(chId => {
      if (chId === activeCh) return;
      const ls = lastSeenRef.current[chId] || 0;
      const count = (msgs[chId] || []).filter(m => m.ts > ls && m.author !== me && !m.sys).length;
      setUnread(p => ({ ...p, [chId]: count }));
    });
  }, [msgs, activeCh, me]);

  const sendMsg = useCallback((content, image) => {
    const payload = { author: me, content: content || '', ts: Date.now() };
    if (image) payload.image = image;
    FB.ref('messages/' + activeCh).push(payload);
  }, [me, activeCh]);

  const addAura = useCallback((username, delta) => {
    FB.ref('aura/' + username).transaction(cur => Math.max(1, (cur || 0) + delta));
  }, []);

  const buyTicket = useCallback(() => {
    if ((auraMap[me] || 0) < 10) return;
    addAura(me, -10);
    FB.ref('tickets/' + me).transaction(cur => (cur || 0) + 1);
  }, [me, auraMap, addAura]);

  const useTicket = useCallback(won => {
    FB.ref('tickets/' + me).transaction(cur => Math.max(0, (cur || 0) - 1));
    if (won) {
      const pool = lotteryPool;
      FB.ref().update({ lottery_pool: 0, ['aura/' + me]: Math.max(1, (auraMap[me] || 0) + pool) });
      FB.ref('messages/' + activeCh).push({
        author: '__system__', ts: Date.now(), sys: true,
        content: `🏆 ${me} just won the Aura Lottery and took ${pool.toLocaleString()} Aura from the pool!`,
      });
    } else {
      FB.ref('lottery_pool').transaction(cur => (cur || 0) + 25);
    }
  }, [me, lotteryPool, auraMap, activeCh]);

  const buyItem = useCallback(item => {
    if ((auraMap[me] || 0) < item.price) return;
    addAura(me, -item.price);
    if (item.type === 'cosmetic') {
      FB.ref('items/' + me + '/' + item.id).set(true);
    } else if (item.id === 'mystery_box') {
      const prize = Math.floor(Math.random() * 30) + 1;
      addAura(me, prize);
      FB.ref('messages/' + activeCh).push({
        author: '__system__', ts: Date.now(), sys: true,
        content: `🎲 ${me} opened a Mystery Box and won ${prize} Aura!`,
      });
    } else if (item.id === 'quiz_boost') {
      FB.ref('items/' + me + '/quiz_boosts').transaction(cur => (cur || 0) + 3);
    } else if (item.id === 'aura_bomb') {
      const online = Object.keys(presence).filter(u => u !== me);
      if (online.length === 0) { addAura(me, item.price); return; }
      const target = online[Math.floor(Math.random() * online.length)];
      addAura(target, 50);
      FB.ref('messages/' + activeCh).push({
        author: '__system__', ts: Date.now(), sys: true,
        content: `💣 ${me} detonated an Aura Bomb — ${target} received 50 Aura!`,
      });
    }
  }, [me, auraMap, addAura, activeCh, presence]);

  const sendChallenge = useCallback((toUser, amount) => {
    const id = genId();
    FB.ref('challenges/' + toUser + '/' + id).set({ from: me, amount, status: 'pending', ts: Date.now() });
  }, [me]);

  const acceptChallenge = useCallback(() => {
    if (!incomingChallenge || !incomingChallengeId) return;
    const { from, amount } = incomingChallenge;
    FB.ref('challenges/' + me + '/' + incomingChallengeId).remove();
    const won = Math.random() < 0.5;
    if (won) { addAura(me, amount); addAura(from, -amount); }
    else      { addAura(from, amount); addAura(me, -amount); }
    const winner = won ? me : from;
    const loser  = won ? from : me;
    FB.ref('messages/' + activeCh).push({
      author:'__system__', ts:Date.now(), sys:true,
      content:`🪙 Coin flip! ${winner} beat ${loser} and won ${amount} Aura!`
    });
    setIncomingChallenge(null); setIncomingChallengeId(null);
  }, [incomingChallenge, incomingChallengeId, me, activeCh, addAura]);

  const declineChallenge = useCallback(() => {
    if (!incomingChallengeId) return;
    FB.ref('challenges/' + me + '/' + incomingChallengeId).remove();
    setIncomingChallenge(null); setIncomingChallengeId(null);
  }, [me, incomingChallengeId]);

  const sendAdminQuiz = useCallback((toUser, question) => {
    FB.ref('quiz_inbox/' + toUser).set({ ...question, from: me, ts: Date.now() });
  }, [me]);

  const handleQuizFinish = useCallback(reward => {
    if (reward > 0) {
      let bonus = 0;
      if (myItems.quiz_boosts > 0) {
        bonus = 15;
        FB.ref('items/' + me + '/quiz_boosts').transaction(cur => Math.max(0, (cur || 0) - 1));
      }
      addAura(me, reward + bonus);
    }
    setActiveQuiz(null);
  }, [me, addAura, myItems]);

  const handleCoinFlipResult = useCallback(delta => {
    addAura(me, delta);
  }, [me, addAura]);

  const onEarnAura = useCallback((amount, questName) => {
    addAura(me, amount);
  }, [me, activeCh, addAura]);

  const editMsg = useCallback((chId, msgId, content) => {
    FB.ref('messages/' + chId + '/' + msgId).update({ content, edited: true });
  }, []);

  const deleteMsg = useCallback((chId, msgId) => {
    FB.ref('messages/' + chId + '/' + msgId).remove();
  }, []);

  const reactMsg = useCallback((chId, msgId, emoji, msgAuthor) => {
    const ref = FB.ref(`reactions/${chId}/${msgId}/${emoji}/${me}`);
    ref.once('value').then(snap => {
      if (snap.exists()) {
        ref.remove();
        if (emoji === '👍' && msgAuthor && msgAuthor !== me) addAura(msgAuthor, -1);
      } else {
        ref.set(true);
        if (emoji === '👍' && msgAuthor && msgAuthor !== me) addAura(msgAuthor, 1);
      }
    });
  }, [me, addAura]);

  const createChannel = useCallback((name, type, members) => {
    const id = 'ch_' + genId();
    const membersArr = type === 'group' ? [me, ...members] : [];
    const membersObj = {};
    membersArr.forEach(u => membersObj[u] = true);
    const now = Date.now();
    const ch = { id, name, type, members: membersObj, created_by: me, created: now };
    FB.ref('channels/' + id).set(ch);
    FB.ref('messages/' + id).push({
      author: '__system__', content: `${me} created this channel`, ts: now, sys: true,
    });
    setChs(prev => [...prev, { ...ch, members: membersArr }]);
    setActiveCh(id);
    setShowModal(false);
  }, [me]);

  const startDM = useCallback(otherUser => {
    const pair = [me, otherUser].sort();
    const dmId = 'dm_' + pair.join('_');
    const existingCh = chs.find(c => c.id === dmId);
    if (existingCh) { setActiveCh(dmId); setShowSidebar(false); return; }
    const membersObj = { [me]: true, [otherUser]: true };
    const now = Date.now();
    const ch = { id: dmId, name: dmId, type: 'dm', members: membersObj, created_by: me, created: now };
    FB.ref('channels/' + dmId).set(ch);
    setActiveCh(dmId);
    setShowSidebar(false);
  }, [me, chs]);

  const saveProfile = useCallback(async ({ display, color }) => {
    await FB.ref('users/' + me).update({ display, color });
  }, [me]);

  const addMemberToGroup = useCallback((channelId, username) => {
    FB.ref('channels/' + channelId + '/members/' + username).set(true);
    FB.ref('messages/' + channelId).push({
      author: '__system__', content: `${me} added ${username}`, ts: Date.now(), sys: true,
    });
  }, [me]);

  const muteUser = useCallback(username => {
    if (muted.includes(username)) {
      FB.ref('muted/' + username).remove();
    } else {
      FB.ref('muted/' + username).set(true);
    }
  }, [muted]);

  const banUser = useCallback(username => {
    if (!window.confirm(`Ban "${username}"? They will be logged out immediately.`)) return;
    FB.ref('banned/' + username).set(true);
    FB.ref('muted/' + username).remove();
    FB.ref('messages/' + activeCh).push({
      author: '__system__', content: `${username} was banned by the owner.`, ts: Date.now(), sys: true,
    });
  }, [activeCh]);

  const promoteAdmin = useCallback(username => {
    if (admins.includes(username)) {
      FB.ref('admins/' + username).remove();
    } else {
      FB.ref('admins/' + username).set(true);
    }
  }, [admins]);

  // Merge reactions into messages
  const [reactions, setReactions] = useState({});
  useEffect(() => {
    const ref = FB.ref('reactions/' + activeCh);
    ref.on('value', snap => setReactions(p => ({ ...p, [activeCh]: snap.val() || {} })));
    return () => ref.off('value');
  }, [activeCh]);

  const messagesWithReactions = useMemo(() => {
    const chMsgs = msgs[activeCh] || [];
    const chReactions = reactions[activeCh] || {};
    return chMsgs.map(m => ({ ...m, reactions: chReactions[m.id] || null }));
  }, [msgs, reactions, activeCh]);

  const visible = useMemo(() =>
    chs.filter(c =>
      c.type === 'public' ||
      ((c.type === 'group' || c.type === 'dm') && c.members.includes(me))
    ),
    [chs, me]
  );

  const leaderboardRanks = useMemo(() => {
    const sorted = Object.entries(auraMap).sort((a,b)=>b[1]-a[1]);
    const ranks = {};
    sorted.forEach(([u], i) => { if (i < 10) ranks[u] = i + 1; });
    return ranks;
  }, [auraMap]);

  const channel = visible.find(c => c.id === activeCh) || null;

  return (
    <div className="layout">
      {showSidebar && <div className="sidebar-overlay" onClick={() => setShowSidebar(false)} />}
      <Sidebar
        channels={visible}
        activeId={activeCh}
        onSelect={id => { setActiveCh(id); setShowSidebar(false); }}
        onNew={() => setShowModal(true)}
        me={me}
        userData={users}
        onLogout={onLogout}
        isOpen={showSidebar}
        presence={presence}
        onOpenProfile={() => setShowProfile(true)}
        onStartDM={startDM}
        unread={unread}
        auraMap={auraMap}
        onOpenLeaderboard={() => setShowLB(true)}
        onOpenCoinFlip={() => setShowCoinFlip(true)}
        onSendQuiz={(me === OWNER || admins.includes(me)) ? u => setQuizTarget(u) : null}
        admins={admins}
        lotteryPool={lotteryPool}
        myTickets={myTickets}
        onOpenLottery={() => setShowLottery(true)}
        onOpenShop={() => setShowShop(true)}
        onOpenRPG={() => setShowRPG(true)}
      />

      {channel
        ? <ChatArea channel={channel} messages={messagesWithReactions} onSend={sendMsg}
                    me={me} userData={users} muted={muted} admins={admins}
                    onMute={muteUser} onBan={banUser} onPromote={promoteAdmin}
                    onAddMember={addMemberToGroup} allUsers={users}
                    onOpenSidebar={() => setShowSidebar(true)}
                    onEditMsg={editMsg} onDeleteMsg={deleteMsg} onReact={reactMsg}
                    presence={presence} auraMap={auraMap}
                    userItems={userItems}
                    onChallenge={u => setChallengeTarget(u)}
                    onSendQuiz={(me === OWNER || admins.includes(me)) ? u => setQuizTarget(u) : null}
                    leaderboardRanks={leaderboardRanks} />
        : <div className="no-ch">
            <button className="mob-menu" style={{position:'absolute',top:9,left:12}}
                    onClick={() => setShowSidebar(true)}>☰</button>
            <span>✨</span><p>Select a channel to start chatting</p>
          </div>
      }

      {showModal && (
        <CreateModal
          onClose={() => setShowModal(false)}
          onCreate={createChannel}
          allUsers={users}
          me={me}
        />
      )}

      {showProfile && (
        <ProfileModal
          me={me}
          userData={users}
          onClose={() => setShowProfile(false)}
          onSave={saveProfile}
        />
      )}

      {activeQuiz && (
        <QuizModal question={activeQuiz} onFinish={handleQuizFinish} />
      )}

      {showLB && (
        <Leaderboard auraMap={auraMap} userData={users} me={me} onClose={() => setShowLB(false)} />
      )}

      {showCoinFlip && (
        <CoinFlipModal
          myAura={auraMap[me] || 0}
          onClose={() => setShowCoinFlip(false)}
          onResult={handleCoinFlipResult}
        />
      )}

      {challengeTarget && (
        <ChallengeSendModal
          target={challengeTarget}
          targetData={users[challengeTarget]}
          myAura={auraMap[me] || 0}
          onClose={() => setChallengeTarget(null)}
          onSend={sendChallenge}
        />
      )}

      {incomingChallenge && (
        <ChallengeNotification
          challenge={incomingChallenge}
          userData={users}
          myAura={auraMap[me] || 0}
          onAccept={acceptChallenge}
          onDecline={declineChallenge}
        />
      )}

      {showLottery && (
        <LotteryModal
          myAura={auraMap[me] || 0}
          myTickets={myTickets}
          pool={lotteryPool}
          onClose={() => setShowLottery(false)}
          onBuyTicket={buyTicket}
          onUseTicket={useTicket}
        />
      )}

      {showShop && (
        <ShopModal
          myAura={auraMap[me] || 0}
          myItems={myItems}
          myTickets={myTickets}
          onClose={() => setShowShop(false)}
          onBuy={buyItem}
        />
      )}

      {quizTarget && (
        <AdminQuizSendModal
          target={quizTarget}
          targetData={users[quizTarget]}
          onClose={() => setQuizTarget(null)}
          onSend={sendAdminQuiz}
        />
      )}

      {showRPG && (
        <RPGWorld
          me={me}
          userData={users}
          auraMap={auraMap}
          admins={admins}
          userItems={userItems}
          onClose={() => setShowRPG(false)}
          onEarnAura={onEarnAura}
        />
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ROOT
═══════════════════════════════════════════════════════════════ */
function App() {
  const [me,      setMe]      = useState(null);
  const [loading, setLoading] = useState(!SETUP_NEEDED);

  useEffect(() => {
    if (SETUP_NEEDED) return;
    const s = localStorage.getItem('am_sess');
    if (!s) { setLoading(false); return; }
    FB.ref('users/' + s).once('value')
      .then(snap => { if (snap.exists()) setMe(s); else localStorage.removeItem('am_sess'); })
      .catch(() => {})
      .finally(() => setLoading(false));
  }, []);

  useEffect(() => {
    if (!me) return;
    const ref = FB.ref('banned/' + me);
    ref.on('value', snap => {
      if (snap.val()) { localStorage.removeItem('am_sess'); setMe(null); }
    });
    return () => ref.off('value');
  }, [me]);

  const login  = useCallback(u => setMe(u), []);
  const logout = useCallback(() => { localStorage.removeItem('am_sess'); setMe(null); }, []);

  if (SETUP_NEEDED) return <SetupScreen />;
  if (loading) return (
    <div className="auth-bg">
      <div style={{ color:'#3a3a5a', fontSize:15, letterSpacing:.5 }}>Connecting…</div>
    </div>
  );
  if (!me) return <AuthScreen onLogin={login} />;
  return <MainApp me={me} onLogout={logout} />;
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(e) {
  document.getElementById('root').innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap;">' + e.stack + '</pre>';
}
</script>
</body>
</html>
