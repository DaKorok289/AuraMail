<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuraMail</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d1a;color:#fff;height:100vh;overflow:hidden;}
#root{height:100vh;display:flex;}

/* ── Auth ── */
.auth-bg{flex:1;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#1a1040 0%,#0a0a18 60%,#080810 100%);}
.auth-card{background:#111120;border:1px solid rgba(255,255,255,.08);border-radius:18px;
  padding:44px 40px;width:420px;box-shadow:0 32px 80px rgba(0,0,0,.7);}
.logo{text-align:center;margin-bottom:30px;}
.logo-icon{font-size:58px;display:block;margin-bottom:10px;
  filter:drop-shadow(0 0 24px rgba(91,141,238,.9));}
.logo h1{font-size:28px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,#fdcb6e,#e17055 40%,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo p{color:#444;font-size:13px;margin-top:5px;}
.tabs{display:flex;gap:4px;background:#080814;border-radius:9px;padding:4px;margin-bottom:24px;}
.tab{flex:1;padding:9px;text-align:center;border-radius:7px;cursor:pointer;
  font-size:14px;font-weight:600;color:#555;transition:all .2s;}
.tab.on{background:linear-gradient(135deg,#5b8dee,#a855f7);color:#fff;}
.inp{display:block;width:100%;padding:12px 14px;background:#080814;
  border:1.5px solid rgba(255,255,255,.07);border-radius:9px;color:#eee;
  font-size:15px;margin-bottom:12px;outline:none;transition:border-color .2s;font-family:inherit;}
.inp:focus{border-color:#5b8dee;}
.inp::placeholder{color:#333;}
.btn-p{display:block;width:100%;padding:13px;
  background:linear-gradient(135deg,#5b8dee,#a855f7);
  border:none;border-radius:9px;color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.3px;transition:opacity .2s;font-family:inherit;}
.btn-p:hover{opacity:.87;}
.btn-p:disabled{opacity:.5;cursor:not-allowed;}
.auth-err{color:#ff7070;font-size:12.5px;
  background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.15);
  border-radius:7px;padding:10px 13px;margin-bottom:13px;}

/* ── Layout ── */
.layout{display:flex;flex:1;min-height:0;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{width:256px;background:#0a0a15;display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.04);flex-shrink:0;}
.sb-head{height:54px;padding:0 16px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.04);
  box-shadow:0 2px 8px rgba(0,0,0,.5);}
.sb-head .brand{font-size:15px;font-weight:900;letter-spacing:-.3px;
  background:linear-gradient(135deg,#fdcb6e,#e17055 50%,#a855f7);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sb-add{width:28px;height:28px;border-radius:50%;background:rgba(91,141,238,.12);
  border:none;color:#5b8dee;font-size:22px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;}
.sb-add:hover{background:rgba(91,141,238,.28);}
.sb-scroll{flex:1;overflow-y:auto;padding:8px 0 4px;}
.sb-scroll::-webkit-scrollbar{width:5px;}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px;}
.sb-label{padding:10px 16px 5px;font-size:10.5px;font-weight:700;
  color:#3a3a5a;text-transform:uppercase;letter-spacing:1.2px;}
.ch-row{display:flex;align-items:center;gap:9px;padding:7px 10px;
  margin:1px 6px;border-radius:7px;cursor:pointer;transition:background .12s;}
.ch-row:hover{background:rgba(255,255,255,.04);}
.ch-row.act{background:rgba(91,141,238,.16);}
.ch-sym{font-size:15px;font-weight:800;color:#3a3a60;width:24px;text-align:center;flex-shrink:0;}
.ch-row.act .ch-sym{color:#6fa3ff;}
.ch-nm{font-size:14px;color:#5a5a80;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-row.act .ch-nm{color:#dde0f8;font-weight:600;}
.user-bar{display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:#07070f;border-top:1px solid rgba(255,255,255,.04);}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.u-name{font-size:13.5px;font-weight:700;color:#c0c4e0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.u-tag{font-size:11px;color:#3a3a60;}
.logout{background:none;border:none;color:#3a3a60;cursor:pointer;
  font-size:18px;transition:color .2s;padding:2px 3px;line-height:1;}
.logout:hover{color:#ff7070;}

/* ── Chat ── */
.chat{flex:1;display:flex;flex-direction:column;background:#111119;min-width:0;}
.chat-head{height:54px;padding:0 22px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.04);box-shadow:0 2px 8px rgba(0,0,0,.4);
  flex-shrink:0;background:#111119;position:relative;}
.chat-head .h-sym{font-size:19px;color:#3a3a60;}
.chat-head .h-nm{font-size:16px;font-weight:700;color:#e0e4ff;}
.chat-head .h-meta{font-size:12px;color:#3a3a60;margin-left:auto;}
.msgs{flex:1;overflow-y:auto;padding:12px 0 6px;}
.msgs::-webkit-scrollbar{width:8px;}
.msgs::-webkit-scrollbar-track{background:transparent;}
.msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:4px;}

.sys-line{text-align:center;padding:5px 20px;font-size:12px;color:#333;font-style:italic;}
.divider{display:flex;align-items:center;gap:12px;padding:12px 22px;}
.divider hr{flex:1;border:none;border-top:1px solid rgba(255,255,255,.04);}
.divider span{font-size:11px;color:#333;white-space:nowrap;}

.msg-grp{display:flex;gap:14px;padding:4px 22px;}
.msg-grp:hover{background:rgba(255,255,255,.012);}
.msg-grp:hover .msg-actions,.msg-cont:hover .msg-actions{opacity:1!important;}
.msg-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;margin-top:2px;}
.msg-body{flex:1;min-width:0;}
.msg-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:3px;}
.msg-author{font-size:15px;font-weight:700;}
.msg-ts{font-size:11px;color:#333;}
.msg-text{font-size:14.5px;color:#b8bcd8;line-height:1.58;word-wrap:break-word;white-space:pre-wrap;}
.msg-cont{display:flex;gap:14px;padding:1px 22px;}
.msg-cont:hover{background:rgba(255,255,255,.012);}
.msg-pad{width:38px;flex-shrink:0;}
.msg-text-only{font-size:14.5px;color:#b8bcd8;line-height:1.58;word-wrap:break-word;white-space:pre-wrap;flex:1;}

.welcome-box{padding:30px 22px 20px;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:8px;}
.welcome-box .w-icon{font-size:56px;margin-bottom:12px;display:block;}
.welcome-box h2{font-size:22px;font-weight:900;color:#e0e4ff;margin-bottom:6px;}
.welcome-box p{font-size:14px;color:#333;}

.input-area{padding:0 22px 20px;flex-shrink:0;}
.input-wrap{display:flex;align-items:flex-end;gap:10px;
  background:#1a1a28;border-radius:11px;padding:11px 14px;
  border:1.5px solid rgba(255,255,255,.05);}
.input-wrap:focus-within{border-color:rgba(91,141,238,.3);}
.msg-inp{flex:1;background:none;border:none;color:#dde0f8;font-size:14.5px;
  outline:none;resize:none;min-height:22px;max-height:120px;line-height:1.55;font-family:inherit;}
.msg-inp::placeholder{color:#2e2e4a;}
.send-btn{width:34px;height:34px;background:linear-gradient(135deg,#5b8dee,#a855f7);
  border:none;border-radius:8px;color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s;}
.send-btn:hover{opacity:.85;}
.send-btn:disabled{opacity:.3;cursor:not-allowed;}

.img-btn{width:32px;height:32px;background:none;border:none;color:#3a3a60;
  font-size:20px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;transition:color .2s;padding:0;}
.img-btn:hover{color:#5b8dee;}
.img-preview-wrap{position:relative;display:inline-flex;margin:0 0 10px 4px;}
.img-preview-thumb{max-height:110px;max-width:200px;border-radius:8px;
  display:block;border:1px solid rgba(255,255,255,.12);}
.img-preview-rm{position:absolute;top:-8px;right:-8px;width:20px;height:20px;
  border-radius:50%;background:#ff4444;border:2px solid #111119;color:#fff;
  font-size:12px;line-height:1;cursor:pointer;display:flex;
  align-items:center;justify-content:center;font-weight:700;}
.img-preview-rm:hover{background:#cc2222;}
.msg-img{max-width:340px;max-height:260px;border-radius:9px;display:block;
  margin-top:6px;cursor:zoom-in;border:1px solid rgba(255,255,255,.07);
  transition:opacity .15s;}
.msg-img:hover{opacity:.88;}
.lightbox-bg{position:fixed;inset:0;background:rgba(0,0,0,.93);
  display:flex;align-items:center;justify-content:center;z-index:500;
  cursor:zoom-out;animation:lbIn .15s ease;}
@keyframes lbIn{from{opacity:0}to{opacity:1}}
.lightbox-img{max-width:90vw;max-height:90vh;border-radius:10px;
  box-shadow:0 8px 64px rgba(0,0,0,.9);object-fit:contain;}
.lightbox-close{position:fixed;top:18px;right:22px;background:rgba(255,255,255,.1);
  border:none;color:#fff;font-size:22px;width:38px;height:38px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;}
.lightbox-close:hover{background:rgba(255,255,255,.2);}
.upload-prog{font-size:12px;color:#5b8dee;padding:3px 0 6px 2px;display:flex;
  align-items:center;gap:6px;}

.no-ch{flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;}
.no-ch span{font-size:60px;opacity:.3;}
.no-ch p{font-size:15px;color:#333;}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);
  display:flex;align-items:center;justify-content:center;z-index:200;}
.modal{background:#171724;border:1px solid rgba(255,255,255,.08);
  border-radius:14px;padding:30px;width:440px;
  box-shadow:0 24px 80px rgba(0,0,0,.7);}
.modal h3{font-size:19px;font-weight:800;margin-bottom:22px;color:#e0e4ff;}
.modal label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.9px;color:#3a3a60;margin-bottom:7px;}
.modal .inp{margin-bottom:16px;}
.type-row{display:flex;gap:10px;margin-bottom:16px;}
.type-card{flex:1;padding:14px 10px;border:2px solid rgba(255,255,255,.06);
  border-radius:9px;cursor:pointer;text-align:center;transition:all .15s;}
.type-card:hover{border-color:rgba(91,141,238,.3);}
.type-card.on{border-color:#5b8dee;background:rgba(91,141,238,.1);}
.type-card .ti{font-size:26px;display:block;margin-bottom:5px;}
.type-card .tn{font-size:12px;font-weight:700;color:#555;}
.type-card.on .tn{color:#7aa3f1;}
.tags-wrap{display:flex;flex-wrap:wrap;gap:5px;align-items:center;
  background:#080814;border:1.5px solid rgba(255,255,255,.07);border-radius:9px;
  padding:7px 10px;margin-bottom:8px;min-height:42px;cursor:text;}
.tag{background:rgba(91,141,238,.15);border:1px solid rgba(91,141,238,.3);
  border-radius:5px;padding:2px 8px;font-size:12.5px;color:#7aa3f1;
  display:flex;align-items:center;gap:5px;}
.tag button{background:none;border:none;color:#7aa3f1;cursor:pointer;font-size:15px;
  line-height:1;padding:0;transition:color .15s;}
.tag button:hover{color:#ff7070;}
.tag-inp{background:none;border:none;color:#ccc;outline:none;
  font-size:13px;flex:1;min-width:80px;font-family:inherit;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}
.btn-cancel{padding:9px 20px;background:rgba(255,255,255,.05);border:none;
  border-radius:7px;color:#888;cursor:pointer;font-size:14px;font-weight:600;
  font-family:inherit;transition:background .15s;}
.btn-cancel:hover{background:rgba(255,255,255,.1);}
.btn-go{padding:9px 24px;background:linear-gradient(135deg,#5b8dee,#a855f7);
  border:none;border-radius:7px;color:#fff;cursor:pointer;font-size:14px;
  font-weight:700;font-family:inherit;transition:opacity .2s;}
.btn-go:hover{opacity:.88;}
.modal-err{font-size:12.5px;color:#ff7070;margin-bottom:12px;
  background:rgba(255,80,80,.08);border-radius:6px;padding:8px 12px;}

/* ── Badges ── */
.owner-badge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:4px;
  background:rgba(255,60,60,.15);color:#ff4444;border:1px solid rgba(255,60,60,.3);
  margin-left:6px;vertical-align:middle;letter-spacing:.6px;text-transform:uppercase;}
.admin-badge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:4px;
  background:rgba(91,141,238,.15);color:#5b8dee;border:1px solid rgba(91,141,238,.3);
  margin-left:6px;vertical-align:middle;letter-spacing:.6px;text-transform:uppercase;}
.muted-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;
  background:rgba(255,80,80,.15);color:#ff7070;border:1px solid rgba(255,80,80,.25);
  margin-left:6px;vertical-align:middle;letter-spacing:.5px;}
.muted-bar{display:flex;align-items:center;justify-content:center;gap:8px;
  background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);
  border-radius:9px;padding:12px 16px;color:#ff7070;font-size:14px;}

/* ── Context menu ── */
.ctx-menu{position:fixed;background:#1e1e2e;border:1px solid rgba(255,255,255,.1);
  border-radius:9px;padding:6px;z-index:300;min-width:160px;
  box-shadow:0 8px 32px rgba(0,0,0,.7);}
.ctx-item{padding:8px 14px;border-radius:6px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;gap:9px;transition:background .12s;}
.ctx-item:hover{background:rgba(255,255,255,.06);}
.ctx-item.danger{color:#ff7070;}
.ctx-item.danger:hover{background:rgba(255,80,80,.12);}
.ctx-item.warn{color:#fdcb6e;}
.ctx-item.warn:hover{background:rgba(253,203,110,.1);}

/* ── User suggestions ── */
.user-sug-item{display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-radius:7px;cursor:pointer;transition:background .12s;}
.user-sug-item:hover{background:rgba(255,255,255,.06);}
.sug-list{background:#0d0d1a;border:1px solid rgba(255,255,255,.08);
  border-radius:8px;margin-top:4px;overflow:hidden;max-height:200px;overflow-y:auto;}

/* ── Members panel ── */
.members-panel{position:absolute;top:54px;right:0;width:260px;
  background:#1a1a2a;border:1px solid rgba(255,255,255,.08);border-radius:0 0 12px 12px;
  padding:14px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.members-panel h4{font-size:11px;font-weight:700;color:#555;margin-bottom:10px;
  text-transform:uppercase;letter-spacing:.8px;}
.member-row{display:flex;align-items:center;gap:10px;padding:7px 4px;border-radius:7px;}
.member-row:hover{background:rgba(255,255,255,.04);}

/* ── Add-member panel ── */
.add-member-panel{position:absolute;top:54px;right:0;width:290px;
  background:#1a1a2a;border:1px solid rgba(255,255,255,.08);border-radius:0 0 12px 12px;
  padding:14px;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.add-member-panel h4{font-size:11px;font-weight:700;color:#555;margin-bottom:10px;
  text-transform:uppercase;letter-spacing:.8px;}
.add-member-inp{display:block;width:100%;padding:9px 12px;background:#0d0d1a;
  border:1.5px solid rgba(255,255,255,.08);border-radius:8px;color:#eee;
  font-size:14px;outline:none;font-family:inherit;}
.add-member-inp:focus{border-color:#5b8dee;}
.panel-sug{margin-top:6px;max-height:200px;overflow-y:auto;}

/* ── DM ── */
.dm-badge{display:inline-block;min-width:18px;height:18px;border-radius:9px;
  background:linear-gradient(135deg,#5b8dee,#a855f7);color:#fff;font-size:11px;
  font-weight:800;text-align:center;line-height:18px;padding:0 5px;margin-left:auto;flex-shrink:0;}
.online-dot{width:8px;height:8px;border-radius:50%;background:#43b581;flex-shrink:0;}
.offline-dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;}

/* ── Profile modal ── */
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:border-color .15s;flex-shrink:0;}
.color-swatch.sel{border-color:#fff;}

/* ── Setup screen ── */
.setup-steps{color:#555;font-size:14px;line-height:1.9;margin-top:8px;}
.setup-steps ol{padding-left:20px;}
.setup-steps li{margin-bottom:2px;}
.setup-highlight{color:#5b8dee;font-weight:700;}
.setup-code{color:#a855f7;font-family:monospace;font-size:13px;background:rgba(168,85,247,.08);
  padding:1px 6px;border-radius:4px;}

/* ── Aura ── */
.aura-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:800;
  padding:1px 7px;border-radius:5px;letter-spacing:.5px;text-transform:uppercase;
  background:linear-gradient(135deg,rgba(253,203,110,.22),rgba(225,112,85,.18));
  color:#fdcb6e;border:1px solid rgba(253,203,110,.35);vertical-align:middle;}
.aura-score{font-size:11px;font-weight:700;color:#ccc;vertical-align:middle;}
.place-badge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:5px;
  border:1px solid;margin-left:4px;vertical-align:middle;letter-spacing:.3px;}
.place-1 {color:#fdcb6e;border-color:rgba(253,203,110,.5);background:rgba(253,203,110,.12);}
.place-2 {color:#b2bec3;border-color:rgba(178,190,195,.4);background:rgba(178,190,195,.1);}
.place-3 {color:#e17055;border-color:rgba(225,112,85,.4);background:rgba(225,112,85,.1);}
.place-top{color:#5b8dee;border-color:rgba(91,141,238,.35);background:rgba(91,141,238,.1);}
.challenge-notif{position:fixed;bottom:24px;right:24px;z-index:600;
  background:#1e1e30;border:1px solid rgba(253,203,110,.3);border-radius:14px;
  padding:18px 20px;width:320px;box-shadow:0 12px 48px rgba(0,0,0,.7);
  animation:slideIn .25s ease;}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.challenge-notif h4{font-size:15px;font-weight:800;color:#e0e4ff;margin-bottom:6px;}
.challenge-notif p{font-size:13px;color:#888;margin-bottom:14px;}
.diff-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;
  text-transform:uppercase;letter-spacing:.6px;}
.diff-easy  {background:rgba(67,181,129,.15);color:#43b581;border:1px solid rgba(67,181,129,.3);}
.diff-medium{background:rgba(253,203,110,.15);color:#fdcb6e;border:1px solid rgba(253,203,110,.3);}
.diff-hard  {background:rgba(255,80,80,.15);  color:#ff7070;border:1px solid rgba(255,80,80,.3);}
.quiz-timer{font-size:13px;font-weight:800;min-width:30px;text-align:right;}
.quiz-question{font-size:16px;font-weight:700;color:#e0e4ff;line-height:1.5;
  margin:14px 0 18px;}
.quiz-choice{padding:11px 14px;border-radius:9px;cursor:pointer;font-size:14px;
  color:#bbb;border:1.5px solid rgba(255,255,255,.07);margin-bottom:8px;
  transition:all .15s;background:#0d0d1a;user-select:none;}
.quiz-choice:hover{border-color:rgba(91,141,238,.4);color:#dde0f8;background:rgba(91,141,238,.06);}
.quiz-choice.selected{border-color:#5b8dee;background:rgba(91,141,238,.12);color:#fff;}
.quiz-choice.correct{border-color:#43b581;background:rgba(67,181,129,.12);color:#43b581;}

function avColor(username) {
  let h = 0;
  for (const c of username) h = (h * 31 + c.charCodeAt(0)) % AV_COLORS.length;
  return AV_COLORS[h];
}

function genId() {
  return Math.random().toString(36).slice(2, 9) + Date.now().toString(36);
}

function fmtTimestamp(ts) {
  const d = new Date(ts), n = new Date();
  const t = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (d.toDateString() === n.toDateString()) return `Today at ${t}`;
  const y = new Date(n); y.setDate(n.getDate() - 1);
  if (d.toDateString() === y.toDateString()) return `Yesterday at ${t}`;
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' at ' + t;
}

function fmtDateLabel(ts) {
  const d = new Date(ts), n = new Date();
  if (d.toDateString() === n.toDateString()) return 'Today';
  const y = new Date(n); y.setDate(n.getDate() - 1);
  if (d.toDateString() === y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function AuraDisplay({ score }) {

    </span>
  );
}

async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function compressImage(file, maxW = 1280, quality = 0.78) {
  return new Promise((resolve, reject) => {
    if (!file.type.startsWith('image/')) return reject(new Error('Not an image'));
    if (file.size > 10 * 1024 * 1024) return reject(new Error('Image must be under 10 MB'));
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.onload = ev => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load image'));
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ═══════════════════════════════════════════════════════════════
   MESSAGE GROUPING
═══════════════════════════════════════════════════════════════ */
function groupMessages(msgs) {
  const out = [];
  let cur = null;
  for (const m of msgs) {
    if (m.sys) { out.push({ sys: true, msg: m }); cur = null; continue; }
    const prev = cur && cur.msgs[cur.msgs.length - 1];
    if (cur && cur.author === m.author && m.ts - prev.ts < 5 * 60 * 1000) {
      cur.msgs.push(m);
    } else {
      cur = { author: m.author, msgs: [m] };
      out.push(cur);
    }
  }
  return out;
}

function insertDividers(groups) {
  const out = [];
  let lastDate = '';
  for (const g of groups) {
    const ts = g.sys ? g.msg.ts : g.msgs[0].ts;
    const label = fmtDateLabel(ts);
    if (label !== lastDate) { out.push({ divider: true, label }); lastDate = label; }
    out.push(g);
  }
  return out;
}

/* ═══════════════════════════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════════════════════════ */
function AuthScreen({ onLogin }) {
  const [tab,  setTab]  = useState('login');
  const [user, setUser] = useState('');
  const [pass, setPass] = useState('');
  const [name, setName] = useState('');
  const [err,  setErr]  = useState('');
  const [busy, setBusy] = useState(false);

  const submit = async e => {
    e.preventDefault(); setErr(''); setBusy(true);
    try {
      if (tab === 'signup') {
        if (user.length < 3)                    return setErr('Username must be at least 3 characters');
        if (user.length > 20)                   return setErr('Username must be 20 characters or fewer');
        if (!/^[a-zA-Z0-9_ ]+$/.test(user))    return setErr('Letters, numbers, spaces, and underscores only');
        if (pass.length < 6)                    return setErr('Password must be at least 6 characters');

        const [bannedSnap, existsSnap] = await Promise.all([
          FB.ref('banned/' + user).once('value'),
          FB.ref('users/' + user).once('value'),
        ]);
        if (bannedSnap.val())    return setErr('This username is banned');
        if (existsSnap.exists()) return setErr('Username already taken');

        const hashed = await hashPw(pass);
        await FB.ref('users/' + user).set({
          username: user,
          display:  name.trim() || user,
          password: hashed,
          color:    AV_COLORS[Math.floor(Math.random() * AV_COLORS.length)],
          joined:   Date.now(),
        });
        await FB.ref('aura/' + user).transaction(cur => cur === null ? 5 : cur);
        localStorage.setItem('am_sess', user);
        onLogin(user);
      } else {
        const snap = await FB.ref('users/' + user).once('value');
        const u = snap.val();
        if (!u) return setErr('Invalid username or password');

        const bannedSnap = await FB.ref('banned/' + user).once('value');
        if (bannedSnap.val()) return setErr('You have been banned from ArrowsMail');

        const hashed = await hashPw(pass);
        if (u.password !== hashed) return setErr('Invalid username or password');

        await FB.ref('aura/' + user).transaction(cur => cur === null ? 5 : cur);
        localStorage.setItem('am_sess', user);
        onLogin(user);
      }
    } catch(e) {
      console.error(e);
      setErr('Connection error — check your Firebase config.');
    } finally {
      setBusy(false);
    }
  };

  return (
    <div className="auth-bg">
      <div className="auth-card">
        <div className="logo">
          <span className="logo-icon">✨</span>
          <h1>AuraMail</h1>
          <p>Connect with anyone, anywhere</p>
        </div>

        <div className="tabs">
          {[['login','Sign In'],['signup','Create Account']].map(([t,label]) => (
            <div key={t} className={`tab${tab===t?' on':''}`}
                 onClick={() => { setTab(t); setErr(''); }}>
              {label}
            </div>
          ))}
        </div>

        {err && <div className="auth-err">⚠ {err}</div>}

        <form onSubmit={submit}>
          {tab === 'signup' && (
            <input className="inp" placeholder="Display name (optional)"
                   value={name} onChange={e => setName(e.target.value)} />
          )}
          <input className="inp" placeholder="Username" autoFocus required
                 value={user} onChange={e => setUser(e.target.value)} />
          <input className="inp" type="password" placeholder="Password" required
                 value={pass} onChange={e => setPass(e.target.value)} />
          <button className="btn-p" type="submit" disabled={busy}>
            {busy ? 'Please wait…' : tab === 'login' ? 'Sign In →' : 'Create Account →'}
          </button>
        </form>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   CREATE CHANNEL MODAL
═══════════════════════════════════════════════════════════════ */
function CreateModal({ onClose, onCreate, allUsers, me }) {
  const [type,    setType]    = useState('public');
  const [chName,  setChName]  = useState('');
  const [mInp,    setMInp]    = useState('');
  const [members, setMembers] = useState([]);
  const [err,     setErr]     = useState('');

  const suggestions = mInp.trim().length > 0
    ? Object.keys(allUsers).filter(k =>
        (k.toLowerCase().includes(mInp.trim().toLowerCase()) ||
         (allUsers[k].display||'').toLowerCase().includes(mInp.trim().toLowerCase())) &&
        k !== me && !members.includes(k))
    : [];

  const addMember = username => {
    if (username === me)             return setErr("That's you — you're already in the group");
    if (members.includes(username))  return setErr(`${username} already added`);
    setMembers(p => [...p, username]); setMInp(''); setErr('');
  };

  const onMInpKey = e => {
    if (e.key !== 'Enter' && e.key !== ',') return;
    e.preventDefault();
    if (suggestions.length > 0) { addMember(suggestions[0]); return; }
    const match = Object.keys(allUsers).find(k => k.toLowerCase() === mInp.trim().toLowerCase());
    if (!match) return setErr(`User "${mInp.trim()}" not found`);
    addMember(match);
  };

  const create = () => {
    if (!chName.trim())                      return setErr('Please enter a channel name');
    if (type === 'group' && !members.length) return setErr('Add at least one member for a group chat');
    onCreate(chName.trim(), type, members);
  };

  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h3>✨ New Channel</h3>

        <label>Type</label>
        <div className="type-row">
          {[['public','#','Public Channel'],['group','👥','Group Chat']].map(([t,icon,label]) => (
            <div key={t} className={`type-card${type===t?' on':''}`} onClick={() => setType(t)}>
              <span className="ti">{icon}</span>
              <span className="tn">{label}</span>
            </div>
          ))}
        </div>

        <label>Name</label>
        <input className="inp" autoFocus
               placeholder={type === 'group' ? 'my-group' : 'channel-name'}
               value={chName}
               onChange={e => setChName(e.target.value.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''))} />

        {type === 'group' && <>
          <label>Add Members</label>
          <div className="tags-wrap"
               onClick={e => e.currentTarget.querySelector('.tag-inp').focus()}>
            {members.map(m => (
              <div key={m} className="tag">
                {(allUsers[m] && allUsers[m].display) || m}
                <button onClick={() => setMembers(p => p.filter(x => x !== m))}>×</button>
              </div>
            ))}
            <input className="tag-inp" placeholder="Search users…"
                   value={mInp} onChange={e => setMInp(e.target.value)} onKeyDown={onMInpKey} />
          </div>
          {suggestions.length > 0 && (
            <div className="sug-list">
              {suggestions.slice(0, 5).map(u => {
                const disp = (allUsers[u] && allUsers[u].display) || u;
                return (
                  <div key={u} className="user-sug-item" onClick={() => addMember(u)}>
                    <div style={{ width:26,height:26,borderRadius:'50%',background:avColor(u),
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:12,fontWeight:800,flexShrink:0 }}>
                      {disp[0].toUpperCase()}
                    </div>
                    <span style={{ fontSize:14,color:'#ccc' }}>{disp}</span>
                    {disp !== u && <span style={{ color:'#3a3a5a',fontSize:12 }}>@{u}</span>}
                  </div>
                );
              })}
            </div>
          )}
        </>}

        {err && <div className="modal-err">⚠ {err}</div>}

        <div className="modal-foot">
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
          <button className="btn-go" onClick={create}>Create</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   QUIZ MODAL
═══════════════════════════════════════════════════════════════ */
function QuizModal({ question, onFinish }) {
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [timeLeft, setTimeLeft] = useState(25);
  const won = revealed && selected === question.ans;

  useEffect(() => {
    if (revealed) return;
    const t = setInterval(() => {
      setTimeLeft(p => {
        if (p <= 1) { clearInterval(t); setRevealed(true); return 0; }
        return p - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [revealed]);

  const submit = () => { if (selected === null) return; setRevealed(true); };

  return (
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:460}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}}>
          <span className={`diff-badge diff-${question.diff}`}>{question.diff}</span>
          <span style={{color:'#fdcb6e',fontWeight:800,fontSize:13,marginLeft:'auto'}}>✨ +{question.reward} aura</span>
          <span className="quiz-timer" style={{color:timeLeft<6?'#ff7070':'#888'}}>{timeLeft}s</span>
        </div>
        <div className="quiz-question">{question.q}</div>
        {question.choices.map((c, i) => {
          let cls = 'quiz-choice';
          if (revealed) {
            if (i === question.ans) cls += ' correct';
            else if (i === selected) cls += ' wrong';
          } else if (selected === i) cls += ' selected';
          return <div key={i} className={cls} onClick={() => !revealed && setSelected(i)}>{c}</div>;
        })}
        {!revealed
          ? <button className="btn-go" style={{width:'100%',marginTop:4}} disabled={selected===null} onClick={submit}>Submit</button>
          : <div style={{marginTop:12,textAlign:'center'}}>
              {won
                ? <div style={{color:'#43b581',fontSize:16,fontWeight:800,marginBottom:10}}>✅ Correct! +{question.reward} aura earned!</div>
                : <div style={{color:'#ff7070',fontSize:16,fontWeight:800,marginBottom:10}}>❌ Wrong! The answer was: {question.choices[question.ans]}</div>
              }
              <button className="btn-go" onClick={() => onFinish(won ? question.reward : 0)}>Collect & Continue</button>
            </div>
        }
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   COIN FLIP MODAL
═══════════════════════════════════════════════════════════════ */
function CoinFlipModal({ myAura, onClose, onResult }) {
  const [choice,   setChoice]   = useState('heads');
  const [bet,      setBet]      = useState(Math.min(10, myAura));
  const [flipping, setFlipping] = useState(false);
  const [result,   setResult]   = useState(null);

  const flip = () => {
    if (bet <= 0 || bet > myAura || flipping) return;
    setFlipping(true); setResult(null);
    setTimeout(() => {
      const coin = Math.random() < 0.5 ? 'heads' : 'tails';
      const won  = coin === choice;
      setResult({ coin, won });
      setFlipping(false);
      onResult(won ? bet : -bet);
    }, 1600);
  };

  return (
    <div className="modal-bg" onClick={e => e.target===e.currentTarget && !flipping && onClose()}>
      <div className="modal" style={{maxWidth:400,textAlign:'center'}}>
        <h3>🪙 Aura Coin Flip</h3>
        <p style={{color:'#888',fontSize:13,marginBottom:18}}>Your aura: <span style={{color:'#fdcb6e',fontWeight:800}}><AuraDisplay score={myAura}/></span></p>

        {flipping && <div className="coin-anim">{choice==='heads'?'🌕':'🌑'}</div>}
        {result && !flipping && (
          <div style={{marginBottom:14}}>
            <div style={{fontSize:50,marginBottom:8}}>{result.coin==='heads'?'🌕':'🌑'}</div>
            <div style={{fontSize:18,fontWeight:800,color:result.won?'#43b581':'#ff7070'}}>
              {result.won ? `+${bet} ✨ You won!` : `-${bet} ✨ You lost!`}
            </div>
          </div>
        )}

        {!flipping && !result && <>
          <label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.9,color:'#3a3a60',marginBottom:8}}>Pick a side</label>
          <div style={{display:'flex',gap:10,marginBottom:18}}>
            <div className={`coin-choice${choice==='heads'?' on':''}`} onClick={()=>setChoice('heads')}>🌕<div style={{fontSize:12,marginTop:4,color:'#888'}}>Heads</div></div>
            <div className={`coin-choice${choice==='tails'?' on':''}`} onClick={()=>setChoice('tails')}>🌑<div style={{fontSize:12,marginTop:4,color:'#888'}}>Tails</div></div>
          </div>
          <label style={{display:'block',fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:.9,color:'#3a3a60',marginBottom:8}}>Bet amount</label>
          <input className="inp" type="number" min={1} max={myAura} value={bet}
            onChange={e=>setBet(Math.min(myAura,Math.max(1,+e.target.value)))} style={{textAlign:'center',marginBottom:4}} />
          <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:16}}>
            {[10,25,50,100].map(v=>(
              <span key={v} style={{cursor:'pointer',fontSize:12,padding:'2px 8px',borderRadius:5,background:'rgba(255,255,255,.06)',color:'#888'}}
                onClick={()=>setBet(Math.min(myAura,v))}>{v}</span>
            ))}
            <span style={{cursor:'pointer',fontSize:12,padding:'2px 8px',borderRadius:5,background:'rgba(255,255,255,.06)',color:'#888'}}
              onClick={()=>setBet(myAura)}>ALL</span>
          </div>
        </>}

        <div className="modal-foot" style={{justifyContent:'center'}}>
          {!flipping && !result && <>
            <button className="btn-cancel" onClick={onClose}>Cancel</button>
            <button className="btn-go" disabled={bet<=0||bet>myAura} onClick={flip}>🪙 Flip!</button>
          </>}
          {result && !flipping && <button className="btn-go" onClick={onClose}>Done</button>}
        </div>
      </div>
    </div>
  );
}

          ))}
        </div>

        <label>Pick a Question</label>
        <div style={{maxHeight:220,overflowY:'auto',marginBottom:14}}>
          {pool.map((q, i) => (
            <div key={i} onClick={() => setPicked(i)}
              style={{padding:'9px 12px',borderRadius:8,marginBottom:6,cursor:'pointer',
                border:`1.5px solid ${picked===i?'#5b8dee':'rgba(255,255,255,.07)'}`,
                background:picked===i?'rgba(91,141,238,.08)':'#0d0d1a',
                fontSize:13,color:picked===i?'#dde0f8':'#888',transition:'all .15s'}}>
              {q.q}
            </div>
          ))}
        </div>

        {question && (
          <div style={{padding:'10px 12px',borderRadius:8,background:'rgba(253,203,110,.06)',
            border:'1px solid rgba(253,203,110,.2)',marginBottom:14,fontSize:13,color:'#fdcb6e'}}>

          </div>

        <div className="modal-foot">
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
          <button className="btn-go" disabled={!question} onClick={() => { onSend(target, question); onClose(); }}>
            Send Quiz →
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════

function LotteryModal({ myAura, myTickets, pool, onClose, onBuyTicket, onUseTicket }) {

  const [wonAmount, setWonAmount] = useState(0);

  const handleUse = () => {
    if (myTickets < 1 || pending) return;
    setPending(true);
    setTimeout(() => {
      const won = Math.random() < 1 / 1000;
      setWonAmount(pool);
      setResult(won ? 'win' : 'lose');
      onUseTicket(won);
      setPending(false);
    }, 800);
  };

  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && !pending && onClose()}>
      <div className="modal" style={{maxWidth:420,textAlign:'center'}}>

          If you lose, <strong style={{color:'#a855f7'}}>25 Aura</strong> is added to the pool.

        {result === null && (
          <>
            <div style={{display:'flex',gap:10,justifyContent:'center',alignItems:'center',marginBottom:20}}>
              <div style={{padding:'12px 20px',background:'rgba(255,255,255,.04)',borderRadius:9,border:'1px solid rgba(255,255,255,.08)'}}>
                <div style={{fontSize:11,color:'#555',textTransform:'uppercase',letterSpacing:.6,fontWeight:700,marginBottom:4}}>Your Tickets</div>
                <div style={{fontSize:28,fontWeight:900,color:'#5b8dee'}}>🎟 {myTickets}</div>
              </div>
              <div style={{padding:'12px 20px',background:'rgba(255,255,255,.04)',borderRadius:9,border:'1px solid rgba(255,255,255,.08)'}}>
                <div style={{fontSize:11,color:'#555',textTransform:'uppercase',letterSpacing:.6,fontWeight:700,marginBottom:4}}>Your Aura</div>

                style={{flex:1}}>
                🎟 Buy Ticket (10 Aura)

              <button className="btn-go" disabled={myTickets < 1 || pending} onClick={handleUse}
                style={{flex:1,background:'linear-gradient(135deg,#fdcb6e,#e17055)'}}>
                {pending ? 'Drawing…' : '🤞 Use Ticket'}

            </div>

        {result === 'win' && (
          <div className="lottery-result">
            <span className="res-icon">🏆</span>
            <div style={{fontSize:22,fontWeight:900,color:'#fdcb6e',marginBottom:8}}>YOU WON!</div>
            <div style={{fontSize:15,color:'#43b581',marginBottom:20}}>+{wonAmount.toLocaleString()} Aura added to your balance!</div>
            <button className="btn-go" style={{background:'linear-gradient(135deg,#fdcb6e,#e17055)'}} onClick={onClose}>Collect Winnings 🎉</button>
          </div>
        )}

        {result === 'lose' && (
          <div className="lottery-result">
            <span className="res-icon">💸</span>
            <div style={{fontSize:20,fontWeight:900,color:'#ff7070',marginBottom:8}}>Not this time!</div>
            <div style={{fontSize:14,color:'#888',marginBottom:20}}>+25 Aura added to the pool. Pool is now <span style={{color:'#fdcb6e',fontWeight:700}}>{(pool + 25).toLocaleString()}</span>.</div>

    </div>

/* ═══════════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════════ */
function ChatArea({ channel, messages, onSend, me, userData, muted, admins, onMute, onBan, onPromote, onAddMember, allUsers, onOpenSidebar, onEditMsg, onDeleteMsg, onReact, presence, auraMap, onChallenge, onSendQuiz, leaderboardRanks, userItems }) {
  const [inp,           setInp]           = useState('');
  const [ctx,           setCtx]           = useState(null);
  const [showAddMember, setShowAddMember] = useState(false);
  const [showMembers,   setShowMembers]   = useState(false);
  const [addInp,        setAddInp]        = useState('');
  const [imgPreview,    setImgPreview]    = useState(null);
  const [uploading,     setUploading]     = useState(false);
  const [lightbox,      setLightbox]      = useState(null);
  const [editingId,     setEditingId]     = useState(null);
  const [editText,      setEditText]      = useState('');
  const [emojiTarget,   setEmojiTarget]   = useState(null);
  const bottomRef        = useRef(null);
  const taRef            = useRef(null);
  const menuRef           = useRef(null);
  const addMemberPanelRef  = useRef(null);
  const membersPanelRef    = useRef(null);
  const fileRef            = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  // Close context menu on outside click
  useEffect(() => {
    if (!ctx) return;
    const close = e => {
      if (menuRef.current && menuRef.current.contains(e.target)) return;
      setCtx(null);
    };
    window.addEventListener('mousedown', close);
    return () => window.removeEventListener('mousedown', close);
  }, [ctx]);

  // Close members panel on outside click
  useEffect(() => {
    if (!showMembers) return;
    const close = e => {
      if (membersPanelRef.current && membersPanelRef.current.contains(e.target)) return;
      setShowMembers(false);
    };
    window.addEventListener('mousedown', close);
    return () => window.removeEventListener('mousedown', close);
  }, [showMembers]);

  // Close add-member panel on outside click
  useEffect(() => {
    if (!showAddMember) return;
    const close = e => {
      if (addMemberPanelRef.current && addMemberPanelRef.current.contains(e.target)) return;
      setShowAddMember(false);
    };
    window.addEventListener('mousedown', close);
    return () => window.removeEventListener('mousedown', close);
  }, [showAddMember]);

  const send = useCallback(() => {
    const t = inp.trim();
    if (!t && !imgPreview) return;
    onSend(t, imgPreview || null);
    setInp(''); setImgPreview(null);
    if (taRef.current) {
      taRef.current.style.height = '22px';
      taRef.current.focus();
    }
  }, [inp, imgPreview, onSend]);

  const onKey = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const pickFile = async e => {
    const file = e.target.files[0]; if (!file) return;
    e.target.value = ''; setUploading(true);
    try { setImgPreview(await compressImage(file)); }
    catch(err) { alert(err.message); }
    finally { setUploading(false); }
  };

  const saveEdit = (msgId) => {
    const t = editText.trim(); if (!t) return;
    onEditMsg(channel.id, msgId, t);
    setEditingId(null); setEditText('');
  };

  const EMOJI_LIST = ['👍','❤️','😂','😮','😢','🔥','🎉','👎','😡','💯'];

  const isOnline = u => !!(presence && presence[u]);

  const canModerate = me === OWNER || admins.includes(me);
  const openCtx = (e, author) => {
    if (author === '__system__' || author === me) return;
    e.preventDefault();
    setCtx({ x: e.clientX, y: e.clientY, author });
  };

  const addSuggestions = addInp.trim()
    ? Object.keys(allUsers || {}).filter(k =>
        (k.toLowerCase().includes(addInp.toLowerCase()) ||
         ((allUsers[k].display||'').toLowerCase().includes(addInp.toLowerCase()))) &&
        !channel.members.includes(k))
    : [];

  const rows = useMemo(() => insertDividers(groupMessages(messages)), [messages]);
  const isMuted = muted.includes(me);

  return (
    <div className="chat">
      <div className="chat-head">
        <button className="mob-menu" onClick={onOpenSidebar}>☰</button>
        <span className="h-sym">{channel.type === 'group' ? '👥' : '#'}</span>
        <span className="h-nm">{channel.name}</span>
        {channel.type === 'group' && (
          <>
            <span className="h-meta" style={{cursor:'pointer'}}
                  onClick={() => { setShowMembers(p => !p); setShowAddMember(false); }}>
              {channel.members.length} members
            </span>
            <button className="sb-add" style={{ marginLeft:8,flexShrink:0 }}
                    onClick={() => { setShowAddMember(p => !p); setShowMembers(false); }} title="Add member">+</button>
          </>
        )}

        {showMembers && channel.type === 'group' && (
          <div className="members-panel" ref={membersPanelRef}>
            <h4>Members — {channel.members.length}</h4>
            {channel.members.map(u => {
              const ud = (allUsers || {})[u] || {};
              const disp = ud.display || u;
              const col  = ud.color   || avColor(u);
              return (
                <div key={u} className="member-row">
                  <div style={{ width:30,height:30,borderRadius:'50%',background:col,
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:13,fontWeight:800,flexShrink:0 }}>
                    {disp[0].toUpperCase()}
                  </div>
                  <div style={{ flex:1,minWidth:0 }}>
                    <div style={{ fontSize:14,color:'#ccc',fontWeight:600,
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>
                      {disp}
                      {u === OWNER && <span className="owner-badge" style={{marginLeft:5}}>Owner</span>}
                      {u !== OWNER && admins.includes(u) && <span className="admin-badge" style={{marginLeft:5}}>Admin</span>}
                    </div>
                    {disp !== u && <div style={{ fontSize:11,color:'#3a3a5a' }}>@{u}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {showAddMember && (
          <div className="add-member-panel" ref={addMemberPanelRef}>
            <h4>Add to Group</h4>
            <input className="add-member-inp" placeholder="Search users…"
                   value={addInp} onChange={e => setAddInp(e.target.value)} autoFocus />
            <div className="panel-sug">
              {addInp.trim() && addSuggestions.length === 0 && (
                <div style={{ padding:'10px 12px', color:'#444', fontSize:13 }}>No users found</div>
              )}
              {addSuggestions.slice(0, 6).map(u => {
                const disp = (allUsers[u] && allUsers[u].display) || u;
                return (
                  <div key={u} className="user-sug-item"
                       onClick={() => { onAddMember(channel.id, u); setAddInp(''); setShowAddMember(false); }}>
                    <div style={{ width:28,height:28,borderRadius:'50%',background:avColor(u),
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontSize:13,fontWeight:800,flexShrink:0 }}>
                      {disp[0].toUpperCase()}
                    </div>
                    <span style={{ fontSize:14,color:'#ccc' }}>{disp}</span>
                    {disp !== u && <span style={{ color:'#3a3a5a',fontSize:12 }}>@{u}</span>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      <div className="msgs">
        <div className="welcome-box">
          <span className="w-icon">{channel.type === 'group' ? '👥' : '#'}</span>
          <h2>Welcome to #{channel.name}</h2>
          <p>
            {channel.type === 'group'
              ? 'This is the start of your group chat.'
              : `This is the beginning of the #${channel.name} channel.`}
          </p>
        </div>

        {rows.map((item, i) => {
          if (item.divider) return (
            <div key={'d' + i} className="divider">
              <hr /><span>{item.label}</span><hr />
            </div>
          );
          if (item.sys) return (
            <div key={item.msg.id} className="sys-line">{item.msg.content}</div>
          );

          const u = userData[item.author] || {};
          const color       = u.color   || avColor(item.author);
          const display     = u.display || item.author;
          const isOwner     = item.author === OWNER;
          const isAdmin     = admins.includes(item.author);
          const isMutedUser = muted.includes(item.author);
          const authorAura  = auraMap ? (auraMap[item.author] || 0) : 0;
          const authorRank  = leaderboardRanks ? leaderboardRanks[item.author] : null;
          const placeCls    = authorRank===1?'place-1':authorRank===2?'place-2':authorRank===3?'place-3':authorRank<=10?'place-top':null;
          const authorItms  = (userItems && userItems[item.author]) || {};
          const nameColor   = authorItms.gold_name ? '#fdcb6e' : color;
          const itemBadge   = authorItms.crown ? '👑' : authorItms.diamond ? '💎' : authorItms.fire ? '🔥' : null;

          return (
            <React.Fragment key={item.msgs[0].id}>
              <div className="msg-grp" onContextMenu={e => openCtx(e, item.author)}>
                <div style={{ position:'relative' }}>
                  <div className="msg-av" style={{ background: color }}>
                    {display[0].toUpperCase()}
                  </div>
                  {isOnline(item.author) && (
                    <div style={{ position:'absolute',bottom:1,right:1,width:10,height:10,
                      borderRadius:'50%',background:'#43b581',border:'2px solid #111119' }} />

                </div>
                <div className="msg-body">
                  <div className="msg-hdr">
                    <span className="msg-author" style={{ color: nameColor }}>{display}</span>
                    {itemBadge && <span className="item-badge">{itemBadge}</span>}
                    {isOwner && <span className="owner-badge">Owner</span>}
                    {!isOwner && isAdmin && <span className="admin-badge">Admin</span>}
                    {isMutedUser && canModerate && <span className="muted-badge">MUTED</span>}
                    {placeCls && <span className={`place-badge ${placeCls}`}>{ordinal(authorRank)}</span>}
                    <AuraDisplay score={authorAura} />
                    <span className="msg-ts">{fmtTimestamp(item.msgs[0].ts)}{item.msgs[0].edited && ' (edited)'}</span>
                  </div>
                  {editingId === item.msgs[0].id
                    ? <div style={{display:'flex',gap:6,marginTop:2}}>
                        <textarea className="msg-inp" style={{flex:1,background:'#1a1a28',border:'1px solid #5b8dee',borderRadius:7,padding:'6px 8px',resize:'none'}}
                          value={editText} autoFocus
                          onChange={e=>setEditText(e.target.value)}
                          onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveEdit(item.msgs[0].id);}if(e.key==='Escape'){setEditingId(null);}}} />
                        <button className="btn-go" style={{padding:'4px 12px',fontSize:13}} onClick={()=>saveEdit(item.msgs[0].id)}>Save</button>
                        <button className="btn-cancel" style={{padding:'4px 10px',fontSize:13}} onClick={()=>setEditingId(null)}>Cancel</button>
                      </div>
                    : <div>
                        <div className="msg-text">{item.msgs[0].content}</div>
                        {item.msgs[0].image && <img className="msg-img" src={item.msgs[0].image} alt="img" onClick={()=>setLightbox(item.msgs[0].image)} />}
                        {item.msgs[0].reactions && (
                          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5}}>
                            {Object.entries(item.msgs[0].reactions).map(([em,users])=>{
                              const count=Object.keys(users).length; if(!count) return null;
                              const reacted=users[me];
                              return <span key={em} onClick={()=>onReact(channel.id,item.msgs[0].id,em,item.author)}
                                style={{cursor:'pointer',fontSize:13,padding:'2px 7px',borderRadius:12,
                                  background:reacted?'rgba(91,141,238,.22)':'rgba(255,255,255,.06)',
                                  border:`1px solid ${reacted?'rgba(91,141,238,.4)':'rgba(255,255,255,.1)'}`,
                                  color:'#ccc',userSelect:'none'}}>
                                {em} {count}
                              </span>;
                            })}
                          </div>
                        )}
                        <div style={{display:'flex',gap:4,marginTop:2,opacity:0}} className="msg-actions">
                          {EMOJI_LIST.slice(0,4).map(em=>(
                            <span key={em} onClick={()=>onReact(channel.id,item.msgs[0].id,em,item.author)}
                              style={{cursor:'pointer',fontSize:15,padding:'1px 4px',borderRadius:5,background:'rgba(255,255,255,.05)',transition:'background .12s'}}
                              title={'React '+em}>{em}</span>
                          ))}
                          <span onClick={()=>setEmojiTarget(emojiTarget===item.msgs[0].id?null:item.msgs[0].id)}
                            style={{cursor:'pointer',fontSize:13,padding:'2px 6px',borderRadius:5,background:'rgba(255,255,255,.05)',color:'#888'}}>+</span>
                          {item.author === me && <>
                            <span style={{cursor:'pointer',fontSize:13,padding:'2px 5px',color:'#888'}} onClick={()=>{setEditingId(item.msgs[0].id);setEditText(item.msgs[0].content||'');}}>✏</span>
                            <span style={{cursor:'pointer',fontSize:13,padding:'2px 5px',color:'#ff7070'}} onClick={()=>{if(window.confirm('Delete this message?'))onDeleteMsg(channel.id,item.msgs[0].id);}}>🗑</span>
                          </>}
                          {(me===OWNER||admins.includes(me))&&item.author!==me&&item.author!==OWNER&&(
                            <span style={{cursor:'pointer',fontSize:13,padding:'2px 5px',color:'#ff7070'}} onClick={()=>{if(window.confirm('Delete this message?'))onDeleteMsg(channel.id,item.msgs[0].id);}}>🗑</span>
                          )}
                        </div>
                        {emojiTarget===item.msgs[0].id&&(
                          <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:4,padding:'6px 8px',background:'#1a1a28',borderRadius:9,border:'1px solid rgba(255,255,255,.08)',maxWidth:240}}>
                            {EMOJI_LIST.map(em=><span key={em} style={{cursor:'pointer',fontSize:18,padding:'2px 4px'}} onClick={()=>{onReact(channel.id,item.msgs[0].id,em,item.author);setEmojiTarget(null);}}>{em}</span>)}
                          </div>
                        )}
                      </div>
                  }
                </div>
              </div>
              {item.msgs.slice(1).map(m => (
                <div key={m.id} className="msg-cont" onContextMenu={e => openCtx(e, item.author)}>
                  <div className="msg-pad" />
                  <div style={{flex:1}}>
                    <div className="msg-text-only">{m.content}</div>
                    {m.image && <img className="msg-img" src={m.image} alt="img" onClick={()=>setLightbox(m.image)} />}
                    {m.reactions && (
                      <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:5}}>
                        {Object.entries(m.reactions).map(([em,users])=>{
                          const count=Object.keys(users).length; if(!count) return null;
                          const reacted=users[me];
                          return <span key={em} onClick={()=>onReact(channel.id,m.id,em,item.author)}
                            style={{cursor:'pointer',fontSize:13,padding:'2px 7px',borderRadius:12,
                              background:reacted?'rgba(91,141,238,.22)':'rgba(255,255,255,.06)',
                              border:`1px solid ${reacted?'rgba(91,141,238,.4)':'rgba(255,255,255,.1)'}`,
                              color:'#ccc',userSelect:'none'}}>
                            {em} {count}
                          </span>;
                        })}
                      </div>
                    )}
                    <div style={{display:'flex',gap:4,marginTop:2,opacity:0}} className="msg-actions">
                      {EMOJI_LIST.slice(0,4).map(em=>(
                        <span key={em} onClick={()=>onReact(channel.id,m.id,em,item.author)} style={{cursor:'pointer',fontSize:15,padding:'1px 4px',borderRadius:5,background:'rgba(255,255,255,.05)'}}>{em}</span>
                      ))}
                      {m.author===me&&<>
                        <span style={{cursor:'pointer',fontSize:13,padding:'2px 5px',color:'#888'}} onClick={()=>{setEditingId(m.id);setEditText(m.content||'');}}>✏</span>
                        <span style={{cursor:'pointer',fontSize:13,padding:'2px 5px',color:'#ff7070'}} onClick={()=>{if(window.confirm('Delete?'))onDeleteMsg(channel.id,m.id);}}>🗑</span>
                      </>}
                    </div>
                  </div>
                </div>
              ))}
            </React.Fragment>
          );
        })}

        <div ref={bottomRef} />
      </div>

      <div className="input-area">
        {isMuted
          ? <div className="muted-bar">🔇 You have been muted</div>
          : <>
              <input type="file" accept="image/*" ref={fileRef} style={{display:'none'}} onChange={pickFile} />
              {imgPreview && (
                <div style={{paddingBottom:6}}>
                  <div className="img-preview-wrap">
                    <img className="img-preview-thumb" src={imgPreview} alt="preview" />
                    <button className="img-preview-rm" onClick={()=>setImgPreview(null)}>×</button>
                  </div>
                </div>
              )}
              {uploading && <div className="upload-prog">⏳ Compressing image…</div>}
              <div className="input-wrap">
                <button className="img-btn" onClick={()=>fileRef.current.click()} title="Attach image">🖼</button>
                <textarea
                  ref={taRef}
                  className="msg-inp"
                  placeholder={`Message #${channel.name}  (Shift+Enter for new line)`}
                  value={inp}
                  rows={1}
                  style={{ height: '22px' }}
                  onChange={e => {
                    setInp(e.target.value);
                    e.target.style.height = '22px';
                    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
                  }}
                  onKeyDown={onKey}
                />
                <button className="send-btn" onClick={send} disabled={!inp.trim() && !imgPreview}>↑</button>
              </div>
            </>
        }
      </div>

      {ctx && (
        <div className="ctx-menu" ref={menuRef} style={{ left: ctx.x, top: ctx.y }}>
          <div style={{ padding:'4px 14px 8px', fontSize:12, color:'#555',
                        borderBottom:'1px solid rgba(255,255,255,.06)', marginBottom:4 }}>
            @{ctx.author}
          </div>
          <div className="ctx-item" style={{color:'#fdcb6e'}}
               onClick={() => { onChallenge(ctx.author); setCtx(null); }}>
            🪙 Challenge to Coin Flip
          </div>
          {onSendQuiz && canModerate && (
            <div className="ctx-item" style={{color:'#a855f7'}}
                 onClick={() => { onSendQuiz(ctx.author); setCtx(null); }}>
              📝 Send Quiz
            </div>
          )}
          {canModerate && ctx.author !== OWNER && !(me !== OWNER && admins.includes(ctx.author)) && <>
            <div className="ctx-item warn" onClick={() => { onMute(ctx.author); setCtx(null); }}>
              {muted.includes(ctx.author) ? '🔊 Unmute' : '🔇 Mute'}
            </div>
            {me === OWNER && (
              <div className="ctx-item" style={{ color:'#5b8dee' }}
                   onClick={() => { onPromote(ctx.author); setCtx(null); }}>
                {admins.includes(ctx.author) ? '⬇ Remove Admin' : '⬆ Make Admin'}
              </div>
            )}
            <div className="ctx-item danger" onClick={() => { onBan(ctx.author); setCtx(null); }}>
              🔨 Ban
            </div>
          </>}
        </div>
      )}

      {lightbox && (
        <div className="lightbox-bg" onClick={()=>setLightbox(null)}>
          <button className="lightbox-close" onClick={()=>setLightbox(null)}>×</button>
          <img className="lightbox-img" src={lightbox} alt="full size" onClick={e=>e.stopPropagation()} />
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   RPG WORLD
═══════════════════════════════════════════════════════════════ */
function RPGWorld({ me, userData, auraMap, onClose, onEarnAura, admins, userItems }) {
  const TILE = 40;
  const isAdmin = (admins||[]).includes(me) || me === OWNER;
  const isMobile = window.innerWidth < 600;
  const PANEL_W = isMobile ? 140 : 210;
  const MG_PANEL_W = isMobile ? 120 : 180;

  // RPG state
  const [avatar,    setAvatar]    = useState(null);
  const [pos,       setPos]       = useState({ x:5, y:7 });
  const [players,   setPlayers]   = useState({});
  const [chatMsgs,  setChatMsgs]  = useState([]);
  const [chatInp,   setChatInp]   = useState('');
  const [steps,     setSteps]     = useState(0);
  const [chatCount, setChatCount] = useState(0);
  const [doneQ,     setDoneQ]     = useState({});
  const [showQ,     setShowQ]     = useState(false);

  // Mini-game state
  const [mgState,    setMgState]    = useState(null);
  const [mgPlayers,  setMgPlayers]  = useState({});
  const [inMG,       setInMG]       = useState(false);
  const [mgPos,      setMgPos]      = useState({ x:12, y:12 });
  const [mgInvite,   setMgInvite]   = useState(null);
  const [showMGPick, setShowMGPick] = useState(false);
  const [mgTimer,    setMgTimer]    = useState(60);
  const [mgResult,   setMgResult]   = useState(null);
  const mgTimerRef  = useRef(null);
  const keysRef     = useRef(new Set());
  const rafRef      = useRef(null);
  const lastMoveRef = useRef(0);
  const lastTagRef  = useRef(0);
  const posRef      = useRef({ x:5, y:7 });
  const mgPosRef    = useRef({ x:12, y:12 });
  const inMGRef     = useRef(false);
  const mgStateRef  = useRef(null);
  const joystickDirRef  = useRef({dx:0, dy:0});
  const joystickKnobRef = useRef(null);
  const joystickBaseRef = useRef(null);

  const chatBoxRef = useRef(null);
  const u    = userData[me]||{};
  const disp = u.display||me;
  const col  = u.color||avColor(me);

  // Register / cleanup player in RPG
  useEffect(() => {
    if (!avatar) return;
    const ref = FB.ref('rpg/players/' + me);
    ref.set({ x: pos.x, y: pos.y, avatar: avatar.emoji, name: disp, color: col, ts: Date.now() });
    ref.onDisconnect().remove();
    return () => { ref.remove(); ref.onDisconnect().cancel(); };
  }, [avatar]);

  // Sync RPG position
  useEffect(() => {
    if (!avatar || inMG) return;
    FB.ref('rpg/players/' + me).update({ x: pos.x, y: pos.y, ts: Date.now() });
  }, [pos, avatar, inMG]);

  // Sync MG position
  useEffect(() => {
    if (!inMG || !avatar) return;
    FB.ref('minigame/players/' + me).update({ x: mgPos.x, y: mgPos.y, ts: Date.now() });
  }, [mgPos, inMG, avatar]);

  // Listen to all RPG players
  useEffect(() => {
    const ref = FB.ref('rpg/players');
    ref.on('value', snap => setPlayers(snap.val() || {}));
    return () => ref.off('value');
  }, []);

  // Listen to RPG chat
  useEffect(() => {
    const ref = FB.ref('rpg/chat');
    ref.limitToLast(60).on('value', snap => {
      const data = snap.val() || {};
      setChatMsgs(Object.entries(data).map(([k,v])=>({id:k,...v})).sort((a,b)=>a.ts-b.ts));
    });
    return () => ref.off('value');
  }, []);

  useEffect(() => {
    if (chatBoxRef.current) chatBoxRef.current.scrollTop = chatBoxRef.current.scrollHeight;
  }, [chatMsgs]);

  // Listen to mini-game state
  useEffect(() => {
    const ref = FB.ref('minigame/state');
    ref.on('value', snap => {
      const s = snap.val();
      setMgState(s);
      if (s && s.status === 'ended' && !mgResult) setMgResult(s);
    });
    return () => ref.off('value');
  }, []);

  // Reward winner (or all hiders for Hide & Seek)
  useEffect(() => {
    if (!mgResult || mgResult.rewarded) return;
    const type = MINIGAME_TYPES.find(t => t.id === mgResult.type);
    if (!type) return;
    if (mgResult.type === 'hide') {
      // Everyone except the final seeker gets aura
      if (me !== mgResult.it) onEarnAura(type.aura, 'Hide & Seek Survivor');
    } else {
      if (mgResult.winner !== me) return;
      onEarnAura(type.aura, type.name + ' Victory');
    }
    FB.ref('minigame/state/rewarded').set(true);
  }, [mgResult]);

  // Listen for invite
  useEffect(() => {
    if (!avatar) return;
    const ref = FB.ref('minigame/invites/' + me);
    ref.on('value', snap => setMgInvite(snap.val() || null));
    return () => ref.off('value');
  }, [avatar, me]);

  // Listen to mini-game players
  useEffect(() => {
    if (!inMG) return;
    const ref = FB.ref('minigame/players');
    ref.on('value', snap => setMgPlayers(snap.val() || {}));
    return () => ref.off('value');
  }, [inMG]);

  // Game timer countdown
  useEffect(() => {
    if (!inMG || !mgState || mgState.status !== 'active') return;
    setMgTimer(60);
    if (mgTimerRef.current) clearInterval(mgTimerRef.current);
    mgTimerRef.current = setInterval(() => {
      setMgTimer(t => {
        if (t <= 1) {
          clearInterval(mgTimerRef.current);
          if (isAdmin) endMinigame();
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(mgTimerRef.current);
  }, [inMG, mgState?.status]);

  // 4 Corners: auto-pick corner 10s after each round starts (admin executes)
  useEffect(() => {
    if (!inMG || !mgState || mgState.type !== 'corners' || mgState.status !== 'active' || !isAdmin) return;
    if (mgState.cornersPickAt) {
      const delay = mgState.cornersPickAt - Date.now();
      if (delay <= 0) { pickCorner(); return; }
      const timer = setTimeout(() => pickCorner(), delay);
      return () => clearTimeout(timer);
    } else {
      // Start the 10s countdown automatically
      FB.ref('minigame/state/cornersPickAt').set(Date.now() + 10000);
    }
  }, [inMG, mgState ? mgState.cornersPickAt : null, mgState ? mgState.status : null, isAdmin]);

  // Tag / Hide & Seek: seeker proximity tagging
  useEffect(() => {
    if (!inMG || !mgState || mgState.status !== 'active' || mgState.it !== me) return;
    if (mgState.type !== 'hide') return;
    Object.entries(mgPlayers).forEach(([uname, pd]) => {
      if (uname === me || pd.eliminated) return;
      if (Math.abs(pd.x - mgPos.x) + Math.abs(pd.y - mgPos.y) <= 1) {
        lastTagRef.current = Date.now();
        FB.ref('minigame/state/it').set(uname);
        FB.ref('minigame/players/' + me + '/score').transaction(cur => (cur||0) + 1);
        // New seeker is sent to spawn; tagger stays where they are

  // Movement handler — reads refs, never stale, never recreated on state changes
  const move = useCallback((dx, dy) => {
    if (inMGRef.current && mgStateRef.current) {
      const curMGState = mgStateRef.current;
      const map = getMGMap(curMGState.type);
      const p = mgPosRef.current;
      const nx = p.x + dx, ny = p.y + dy;
      if (ny < 0 || ny >= map.length || nx < 0 || nx >= (map[0]||[]).length) return;
      const tile = map[ny] ? map[ny][nx] : 1;
      if (tile === 1 || tile === 2) return;
      let newPos;
      newPos = { x: nx, y: ny };
      mgPosRef.current = newPos;
      setMgPos(newPos);
    } else {
      const p = posRef.current;
      const nx = p.x + dx, ny = p.y + dy;
      if (nx < 1 || nx >= MAP_W-1 || ny < 1 || ny >= MAP_H-1) return;
      if (RPG_MAP[ny][nx] === 2 || RPG_MAP[ny][nx] === 1) return;
      const newPos = { x: nx, y: ny };

      setPos(newPos);
      setSteps(s => s + 1);
    }
  }, [me]);

  // Track held keys
  useEffect(() => {
    const MOVE_KEYS = new Set(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d']);
    const onDown = e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (MOVE_KEYS.has(e.key)) { e.preventDefault(); keysRef.current.add(e.key); }
    };
    const onUp = e => keysRef.current.delete(e.key);
    window.addEventListener('keydown', onDown);
    window.addEventListener('keyup',   onUp);
    return () => { window.removeEventListener('keydown', onDown); window.removeEventListener('keyup', onUp); };
  }, []);

  // RAF movement loop — moves at fixed interval, no key-repeat lag
  useEffect(() => {
    const INTERVAL = 100; // ms between steps
    const tick = now => {
      rafRef.current = requestAnimationFrame(tick);
      if (now - lastMoveRef.current < INTERVAL) return;
      const k = keysRef.current;
      let dx = 0, dy = 0;
      if (k.has('ArrowUp')    || k.has('w')) dy = -1;
      else if (k.has('ArrowDown')  || k.has('s')) dy =  1;
      if (k.has('ArrowLeft')  || k.has('a')) dx = -1;
      else if (k.has('ArrowRight') || k.has('d')) dx =  1;
      // Joystick input (mobile)
      if (dx === 0 && dy === 0) { const j = joystickDirRef.current; dx = j.dx; dy = j.dy; }
      if (dx !== 0 || dy !== 0) { move(dx, dy); lastMoveRef.current = now; }

    return () => cancelAnimationFrame(rafRef.current);

  // ── Shared renderers ─────────────────────────────────────────
  const Joystick = () => {
    const BR = 48, KR = 22, DEAD = 14;
    const onMove = (clientX, clientY) => {
      const base = joystickBaseRef.current;
      if (!base) return;
      const r = base.getBoundingClientRect();
      const rawX = clientX - (r.left + r.width / 2);
      const rawY = clientY - (r.top + r.height / 2);
      const dist = Math.sqrt(rawX * rawX + rawY * rawY);
      const clamped = Math.min(dist, BR);
      const angle = Math.atan2(rawY, rawX);
      if (joystickKnobRef.current)
        joystickKnobRef.current.style.transform = `translate(${Math.cos(angle)*clamped}px,${Math.sin(angle)*clamped}px)`;
      if (dist < DEAD) {
        joystickDirRef.current = {dx:0, dy:0};
      } else {
        let dx=0, dy=0;
        if      (angle > -Math.PI/4  && angle <= Math.PI/4)   dx =  1;
        else if (angle > Math.PI/4   && angle <= 3*Math.PI/4) dy =  1;
        else if (angle < -Math.PI/4  && angle >= -3*Math.PI/4) dy = -1;
        else                                                    dx = -1;
        joystickDirRef.current = {dx, dy};
      }
    };

      joystickDirRef.current = {dx:0, dy:0};

    };

        style={{position:'relative',width:BR*2,height:BR*2,flexShrink:0,touchAction:'none',userSelect:'none',WebkitUserSelect:'none'}}

        {/* Knob */}
        <div ref={joystickKnobRef}

  // ── Mini-game invite overlay ──────────────────────────────────
  const InviteOverlay = mgInvite && !inMG && (
    <div style={{position:'absolute',bottom:180,left:'50%',transform:'translateX(-50%)',background:'#1a1a2a',border:'1px solid rgba(255,255,255,.1)',borderRadius:16,padding:'16px 20px',zIndex:20,boxShadow:'0 8px 32px rgba(0,0,0,.8)',textAlign:'center',minWidth:260}}>
